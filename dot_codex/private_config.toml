[tui.model_availability_nux]
"gpt-5.5" = 4

# --- mcp_servers (managed by mcp-sync; edits here will be overwritten) ---

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.playwright]
command = "env"
args = ["-u", "HTTPS_PROXY", "-u", "HTTP_PROXY", "npx", "-y", "@playwright/mcp@latest", "--executable-path", "/usr/bin/chromium", "--headless"]

[mcp_servers.chrome-devtools]
command = "env"
args = ["-u", "HTTPS_PROXY", "-u", "HTTP_PROXY", "npx", "-y", "chrome-devtools-mcp@latest"]

[mcp_servers.react-grab-mcp]
command = "npx"
args = ["-y", "@react-grab/mcp", "--stdio"]
