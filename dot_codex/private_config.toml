apply_patch_freeform = true
shell_snapshot = true

[mcp_servers.react-grab-mcp]
command = "npx"
args = ["-y", "@react-grab/mcp", "--stdio"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

[mcp_servers.exa]
command = "npx"
args = ["-y", "exa-mcp-server"]

[mcp_servers.exa.env]
EXA_API_KEY = "${EXA_API_KEY}"

[mcp_servers.claude-mem-search]
command = "node"
args = ["/home/nullsense/.claude/plugins/cache/thedotmack/claude-mem/12.4.8/scripts/mcp-server.cjs"]

[mcp_servers.claude-mem-search.env]
CLAUDE_PLUGIN_ROOT = "/home/nullsense/.claude/plugins/cache/thedotmack/claude-mem/12.4.8"

[plugins."github@openai-curated"]
enabled = true

