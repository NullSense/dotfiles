# preset=crisp — pro-standard "studio voiceover" chain for adult male voice.
# Matches consensus across Lenny B / Joe Crow / Marcus DePaula / Shure SM7B
# guides: corrective EQ → compression for 3-6 dB GR → sweetening EQ → limiter.
# Tuned for clarity that cuts through compressed call audio (Discord, Zoom).
context.modules = [
  { name = libpipewire-module-filter-chain
    args = {
      node.description = "Voice (Cleaned)"
      media.name       = "Voice (Cleaned)"
      filter.graph = {
        nodes = [
          # 1. HPF — kill rumble below voice fundamentals.
          { type = builtin name = hpf          label = bq_highpass  control = { Freq =   80.0  Q = 0.707 } }

          # 2. RNNoise — neural noise suppression.
          { type = ladspa  name = rnnoise
            plugin = /usr/lib/ladspa/librnnoise_ladspa.so
            label  = noise_suppressor_mono
            control = {
              "VAD Threshold (%)"          = 50.0
              "VAD Grace Period (ms)"      = 200
              "Retroactive VAD Grace (ms)" = 0
            } }

          # ─── Corrective EQ (cuts before boosts — pro rule of thumb) ───
          # 3. Mud cut at 250 Hz — proximity buildup on a close-mic'd voice.
          { type = builtin name = eq_mud       label = bq_peaking   control = { Freq =  250.0  Q = 1.0  Gain = -3.0 } }
          # 4. Box cut at 450 Hz — "cardboard" coloration adult male voices have.
          { type = builtin name = eq_box       label = bq_peaking   control = { Freq =  450.0  Q = 1.4  Gain = -2.5 } }
          # 5. Nasal cut at 1.5 kHz — tames the "honky" range Q2U is prone to.
          { type = builtin name = eq_nasal     label = bq_peaking   control = { Freq = 1500.0  Q = 1.5  Gain = -1.5 } }

          # ─── Sweetening EQ (boosts after cuts) ───
          # 6. Body — gentle low-shelf for chest fullness.
          { type = builtin name = eq_body      label = bq_peaking   control = { Freq =  110.0  Q = 1.0  Gain =  1.5 } }
          # 7. Presence — clarity and intelligibility (consensus 2-5 kHz, +2-4 dB).
          { type = builtin name = eq_presence  label = bq_peaking   control = { Freq = 3000.0  Q = 1.0  Gain =  3.0 } }
          # 8. Air — high-shelf for openness without sibilance push.
          { type = builtin name = eq_air       label = bq_highshelf control = { Freq = 9000.0  Q = 0.7  Gain =  3.0 } }

          # 9. Compressor — 3:1, threshold targeting 3-6 dB gain reduction.
          { type = ladspa name = comp
            plugin = /usr/lib/ladspa/lsp-plugins-ladspa.so
            label  = "http://lsp-plug.in/plugins/ladspa/compressor_mono"
            control = {
              "Compression mode"      = 0       # Downward
              "Sidechain mode"        = 1       # Peak detection
              "Attack threshold (G)"  = 0.1     # -20 dB
              "Release threshold (G)" = 0.0
              "Attack time (ms)"      = 5.0     # fast enough to catch transients without dulling consonants
              "Release time (ms)"     = 130.0   # 100-200 ms is the broadcast sweet spot
              "Ratio"                 = 3.0
              "Knee (G)"              = 0.501   # soft knee (-6 dB)
              "Makeup gain (G)"       = 2.818   # +9 dB
            } }

          # 10. Limiter — broadcast-safe -1 dB ceiling.
          { type = ladspa name = lim
            plugin = /usr/lib/ladspa/lsp-plugins-ladspa.so
            label  = "http://lsp-plug.in/plugins/ladspa/limiter_mono"
            control = {
              "Operating mode"    = 0
              "Threshold (G)"     = 0.891       # -1 dB
              "Lookahead (ms)"    = 5.0
              "Attack time (ms)"  = 4.0
              "Release time (ms)" = 6.0
            } }
        ]
        links = [
          { output = "hpf:Out"          input = "rnnoise:Input"   }
          { output = "rnnoise:Output"   input = "eq_mud:In"       }
          { output = "eq_mud:Out"       input = "eq_box:In"       }
          { output = "eq_box:Out"       input = "eq_nasal:In"     }
          { output = "eq_nasal:Out"     input = "eq_body:In"      }
          { output = "eq_body:Out"      input = "eq_presence:In"  }
          { output = "eq_presence:Out"  input = "eq_air:In"       }
          { output = "eq_air:Out"       input = "comp:Input"      }
          { output = "comp:Output"      input = "lim:Input"       }
        ]
      }
      capture.props = {
        node.name      = "capture.voice_cleaned"
        node.passive   = true
        audio.rate     = 48000
        audio.channels = 1
        target.object  = "alsa_input.usb-Samson_Technologies_Samson_Q2U_Microphone-00.analog-stereo"
      }
      playback.props = {
        node.name        = "voice_cleaned"
        node.description = "Voice (Cleaned)"
        media.class      = Audio/Source
        audio.rate       = 48000
        audio.channels   = 1
        priority.session = 4000
      }
    }
  }
]
