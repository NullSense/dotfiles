# preset=daily — set-and-forget for variable boom-arm placement (6"–30 cm).
# Tuned for "Option B" workflow: lean in for important calls, push out for
# casual work, preset stays the same. Heavier compression than crisp does
# the auto-leveling so perceived loudness is constant across distances.
context.modules = [
  { name = libpipewire-module-filter-chain
    args = {
      node.description = "Voice (Cleaned)"
      media.name       = "Voice (Cleaned)"
      filter.graph = {
        nodes = [
          # 1. HPF — broadcast standard, leaves chest fundamentals intact.
          { type = builtin name = hpf          label = bq_highpass  control = { Freq =   80.0  Q = 0.707 } }

          # 2. RNNoise — standard model.
          { type = ladspa  name = rnnoise
            plugin = /usr/lib/ladspa/librnnoise_ladspa.so
            label  = noise_suppressor_mono
            control = {
              "VAD Threshold (%)"          = 55.0
              "VAD Grace Period (ms)"      = 200
              "Retroactive VAD Grace (ms)" = 0
            } }

          # ─── Corrective EQ (gentler than crisp — proximity varies with distance) ───
          # Body lift — keeps voice full when boom is pushed back.
          { type = builtin name = eq_body      label = bq_peaking   control = { Freq =  130.0  Q = 1.0  Gain =  2.0 } }
          # Mud cut — milder than crisp, since proximity isn't constant.
          { type = builtin name = eq_mud       label = bq_peaking   control = { Freq =  280.0  Q = 1.0  Gain = -2.0 } }
          # Box cut — same regardless of placement, room reflections live here.
          { type = builtin name = eq_box       label = bq_peaking   control = { Freq =  450.0  Q = 1.4  Gain = -2.5 } }
          # Mild nasal cut.
          { type = builtin name = eq_nasal     label = bq_peaking   control = { Freq = 1500.0  Q = 1.5  Gain = -1.0 } }

          # ─── Sweetening EQ ───
          # Presence — slightly higher band than crisp for cut-through at any distance.
          { type = builtin name = eq_presence  label = bq_peaking   control = { Freq = 3500.0  Q = 1.0  Gain =  3.5 } }
          # Air — gentler than crisp; we don't want sibilance push when close.
          { type = builtin name = eq_air       label = bq_highshelf control = { Freq = 9000.0  Q = 0.7  Gain =  2.5 } }

          # 9. Compressor — 4:1 with -22 dB threshold = the workhorse.
          #    Catches level swings caused by boom-arm movement and posture changes.
          #    Aim is constant perceived loudness regardless of where you sit.
          { type = ladspa name = comp
            plugin = /usr/lib/ladspa/lsp-plugins-ladspa.so
            label  = "http://lsp-plug.in/plugins/ladspa/compressor_mono"
            control = {
              "Compression mode"      = 0       # Downward
              "Sidechain mode"        = 1       # Peak detection
              "Attack threshold (G)"  = 0.0794  # -22 dB — earlier kickin than crisp
              "Release threshold (G)" = 0.0
              "Attack time (ms)"      = 5.0     # fast enough to catch transients
              "Release time (ms)"     = 130.0   # broadcast sweet spot
              "Ratio"                 = 4.0     # heavier than 3:1 — handles 6 dB distance swing
              "Knee (G)"              = 0.501   # soft knee (-6 dB)
              "Makeup gain (G)"       = 3.35    # +10.5 dB
            } }

          # 10. Limiter — -1 dB ceiling for broadcast-safe output.
          { type = ladspa name = lim
            plugin = /usr/lib/ladspa/lsp-plugins-ladspa.so
            label  = "http://lsp-plug.in/plugins/ladspa/limiter_mono"
            control = {
              "Operating mode"    = 0
              "Threshold (G)"     = 0.891       # -1 dB
              "Lookahead (ms)"    = 5.0
              "Attack time (ms)"  = 4.0
              "Release time (ms)" = 6.0
            } }
        ]
        links = [
          { output = "hpf:Out"          input = "rnnoise:Input"   }
          { output = "rnnoise:Output"   input = "eq_body:In"      }
          { output = "eq_body:Out"      input = "eq_mud:In"       }
          { output = "eq_mud:Out"       input = "eq_box:In"       }
          { output = "eq_box:Out"       input = "eq_nasal:In"     }
          { output = "eq_nasal:Out"     input = "eq_presence:In"  }
          { output = "eq_presence:Out"  input = "eq_air:In"       }
          { output = "eq_air:Out"       input = "comp:Input"      }
          { output = "comp:Output"      input = "lim:Input"       }
        ]
      }
      capture.props = {
        node.name      = "capture.voice_cleaned"
        node.passive   = true
        audio.rate     = 48000
        audio.channels = 1
        target.object  = "alsa_input.usb-Samson_Technologies_Samson_Q2U_Microphone-00.analog-stereo"
      }
      playback.props = {
        node.name        = "voice_cleaned"
        node.description = "Voice (Cleaned)"
        media.class      = Audio/Source
        audio.rate       = 48000
        audio.channels   = 1
        priority.session = 4000
      }
    }
  }
]
