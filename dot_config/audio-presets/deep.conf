# preset=deep — late-night radio DJ. Big chest, smooth body, gentle treble.
# Use this if other presets sound too thin. Heaviest compression of the set.
context.modules = [
  { name = libpipewire-module-filter-chain
    args = {
      node.description = "Voice (Cleaned)"
      media.name       = "Voice (Cleaned)"
      filter.graph = {
        nodes = [
          { type = builtin name = hpf          label = bq_highpass control = { Freq =   55.0  Q = 0.707 } }
          { type = ladspa  name = rnnoise
            plugin = /usr/lib/ladspa/librnnoise_ladspa.so
            label  = noise_suppressor_mono
            control = {
              "VAD Threshold (%)"          = 50.0
              "VAD Grace Period (ms)"      = 200
              "Retroactive VAD Grace (ms)" = 0
            } }
          { type = builtin name = eq_chest     label = bq_peaking   control = { Freq =   90.0  Q = 1.0  Gain =  5.0 } }
          { type = builtin name = eq_body      label = bq_peaking   control = { Freq =  180.0  Q = 1.0  Gain =  2.0 } }
          { type = builtin name = eq_box       label = bq_peaking   control = { Freq =  450.0  Q = 1.5  Gain = -3.0 } }
          { type = builtin name = eq_presence  label = bq_peaking   control = { Freq = 2800.0  Q = 1.0  Gain =  2.0 } }
          { type = builtin name = eq_air       label = bq_highshelf control = { Freq = 8000.0  Q = 0.7  Gain =  1.0 } }
          { type = ladspa name = comp
            plugin = /usr/lib/ladspa/lsp-plugins-ladspa.so
            label  = "http://lsp-plug.in/plugins/ladspa/compressor_mono"
            control = {
              "Compression mode"      = 0
              "Sidechain mode"        = 1
              "Attack threshold (G)"  = 0.0631  # -24 dB
              "Release threshold (G)" = 0.0
              "Attack time (ms)"      = 12.0
              "Release time (ms)"     = 180.0
              "Ratio"                 = 5.0
              "Makeup gain (G)"       = 2.818   # +9 dB
            } }
          { type = ladspa name = lim
            plugin = /usr/lib/ladspa/lsp-plugins-ladspa.so
            label  = "http://lsp-plug.in/plugins/ladspa/limiter_mono"
            control = {
              "Operating mode"    = 0
              "Threshold (G)"     = 0.891       # -1 dB
              "Lookahead (ms)"    = 5.0
              "Attack time (ms)"  = 4.0
              "Release time (ms)" = 6.0
            } }
        ]
        links = [
          { output = "hpf:Out"          input = "rnnoise:Input"   }
          { output = "rnnoise:Output"   input = "eq_chest:In"     }
          { output = "eq_chest:Out"     input = "eq_body:In"      }
          { output = "eq_body:Out"      input = "eq_box:In"       }
          { output = "eq_box:Out"       input = "eq_presence:In"  }
          { output = "eq_presence:Out"  input = "eq_air:In"       }
          { output = "eq_air:Out"       input = "comp:Input"      }
          { output = "comp:Output"      input = "lim:Input"       }
        ]
      }
      capture.props = {
        node.name      = "capture.voice_cleaned"
        node.passive   = true
        audio.rate     = 48000
        audio.channels = 1
        target.object  = "alsa_input.usb-Samson_Technologies_Samson_Q2U_Microphone-00.analog-stereo"
      }
      playback.props = {
        node.name        = "voice_cleaned"
        node.description = "Voice (Cleaned)"
        media.class      = Audio/Source
        audio.rate       = 48000
        audio.channels   = 1
        priority.session = 4000
      }
    }
  }
]
