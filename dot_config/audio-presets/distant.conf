# preset=distant — Q2U at ~30-60 cm (boom-arm pushed away).
# Compensates for signal-loss-with-distance: more makeup gain, heavier
# compression, presence/air boosts to fight HF rolloff over distance.
# Quality WILL be worse than close-mic'd presets — physics, not config.
# For best results, sit at ~30 cm; arm's length (60 cm) is the upper limit.
context.modules = [
  { name = libpipewire-module-filter-chain
    args = {
      node.description = "Voice (Cleaned)"
      media.name       = "Voice (Cleaned)"
      filter.graph = {
        nodes = [
          # 1. HPF — kill rumble; tighter than close-mic since no proximity to preserve.
          { type = builtin name = hpf          label = bq_highpass  control = { Freq =   90.0  Q = 0.707 } }

          # 2. RNNoise — works harder when room signal is closer to voice signal.
          { type = ladspa  name = rnnoise
            plugin = /usr/lib/ladspa/librnnoise_ladspa.so
            label  = noise_suppressor_mono
            control = {
              "VAD Threshold (%)"          = 60.0   # higher than close presets — be stricter about silencing pauses
              "VAD Grace Period (ms)"      = 250
              "Retroactive VAD Grace (ms)" = 0
            } }

          # ─── Corrective EQ ───
          # Slight body LIFT (no proximity at distance — voice sounds thin without it).
          { type = builtin name = eq_body      label = bq_peaking   control = { Freq =  180.0  Q = 1.0  Gain =  2.0 } }
          # Box cut still applies — room reflections accumulate in 400-600 Hz.
          { type = builtin name = eq_box       label = bq_peaking   control = { Freq =  450.0  Q = 1.4  Gain = -3.0 } }
          # Mild nasal cut — nasal artifacts are MORE prominent at distance.
          { type = builtin name = eq_nasal     label = bq_peaking   control = { Freq = 1500.0  Q = 1.5  Gain = -1.5 } }

          # ─── Sweetening EQ — extra to compensate for distance HF rolloff ───
          { type = builtin name = eq_presence  label = bq_peaking   control = { Freq = 3500.0  Q = 1.0  Gain =  4.0 } }
          { type = builtin name = eq_air       label = bq_highshelf control = { Freq = 9000.0  Q = 0.7  Gain =  4.0 } }

          # 9. Compressor — heavier than close-mic chains because the signal
          #    is quieter and more dynamic (more pickup of room variation).
          { type = ladspa name = comp
            plugin = /usr/lib/ladspa/lsp-plugins-ladspa.so
            label  = "http://lsp-plug.in/plugins/ladspa/compressor_mono"
            control = {
              "Compression mode"      = 0       # Downward
              "Sidechain mode"        = 1       # Peak detection
              "Attack threshold (G)"  = 0.0631  # -24 dB — kicks in earlier
              "Release threshold (G)" = 0.0
              "Attack time (ms)"      = 5.0
              "Release time (ms)"     = 130.0
              "Ratio"                 = 4.0     # heavier than 3:1 — distance brings level swings
              "Knee (G)"              = 0.501
              "Makeup gain (G)"       = 3.981   # +12 dB — compensates the 12 dB loss at arm's length
            } }

          # 10. Limiter — same -1 dB ceiling as other presets.
          { type = ladspa name = lim
            plugin = /usr/lib/ladspa/lsp-plugins-ladspa.so
            label  = "http://lsp-plug.in/plugins/ladspa/limiter_mono"
            control = {
              "Operating mode"    = 0
              "Threshold (G)"     = 0.891       # -1 dB
              "Lookahead (ms)"    = 5.0
              "Attack time (ms)"  = 4.0
              "Release time (ms)" = 6.0
            } }
        ]
        links = [
          { output = "hpf:Out"          input = "rnnoise:Input"   }
          { output = "rnnoise:Output"   input = "eq_body:In"      }
          { output = "eq_body:Out"      input = "eq_box:In"       }
          { output = "eq_box:Out"       input = "eq_nasal:In"     }
          { output = "eq_nasal:Out"     input = "eq_presence:In"  }
          { output = "eq_presence:Out" input = "eq_air:In"       }
          { output = "eq_air:Out"       input = "comp:Input"      }
          { output = "comp:Output"      input = "lim:Input"       }
        ]
      }
      capture.props = {
        node.name      = "capture.voice_cleaned"
        node.passive   = true
        audio.rate     = 48000
        audio.channels = 1
        target.object  = "alsa_input.usb-Samson_Technologies_Samson_Q2U_Microphone-00.analog-stereo"
      }
      playback.props = {
        node.name        = "voice_cleaned"
        node.description = "Voice (Cleaned)"
        media.class      = Audio/Source
        audio.rate       = 48000
        audio.channels   = 1
        priority.session = 4000
      }
    }
  }
]
