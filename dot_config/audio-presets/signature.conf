# preset=signature — recipe-driven, bassy, clean, anti-tinny.
#
# v2 tuning (post-feedback): pulled back from "maximize presence/air metric"
# toward the published Lenny B / Shure SM7B / Joe Crow voice-over chain.
#
# Changes from v1:
#   - body lift +1.5 → +2.5 dB (more chest weight)
#   - presence  +4 dB at 3.5 kHz → +2.5 dB at 3.0 kHz (less "tinny")
#   - air      +3.5 dB at 9 kHz → +2 dB at 8 kHz (less brittle, more silk)
#   - new harshness cut at 2500 Hz, -2 dB (kills the frequency that *makes*
#     things sound tinny on a Q2U / SM7B family mic)
#
# Sources (consensus across):
#   Lenny B voice-over chain, Shure SM7B podcast guide, Joe Crow podcast
#   vocal mixing, Music Guy Mixing male vocal EQ, Marcus DePaula compression.
#   All agreed: keep boosts ≤ +3 dB, presence around 2-3 kHz, air around 8 kHz,
#   cut harshness at 1.4k and 2.5k.

context.modules = [
  { name = libpipewire-module-filter-chain
    args = {
      node.description = "Voice (Cleaned)"
      media.name       = "Voice (Cleaned)"
      filter.graph = {
        nodes = [
          # 1. HPF — broadcast standard.
          { type = builtin name = hpf          label = bq_highpass  control = { Freq =   80.0  Q = 0.707 } }

          # 2. RNNoise.
          { type = ladspa  name = rnnoise
            plugin = /usr/lib/ladspa/librnnoise_ladspa.so
            label  = noise_suppressor_mono
            control = {
              "VAD Threshold (%)"          = 50.0
              "VAD Grace Period (ms)"      = 200
              "Retroactive VAD Grace (ms)" = 0
            } }

          # ─── Body / warmth (more than v1) ───
          # Chest body — bumped to +2.5 dB to fight the "tinny" perception.
          { type = builtin name = eq_body      label = bq_peaking   control = { Freq =  120.0  Q = 1.0  Gain =  2.5 } }

          # ─── Corrective cuts ───
          # Mud — proximity buildup.
          { type = builtin name = eq_mud       label = bq_peaking   control = { Freq =  250.0  Q = 1.0  Gain = -3.0 } }
          # Box — adult-male "cardboard".
          { type = builtin name = eq_box       label = bq_peaking   control = { Freq =  450.0  Q = 1.4  Gain = -2.0 } }
          # Nasal — "honky" mids.
          { type = builtin name = eq_nasal     label = bq_peaking   control = { Freq = 1500.0  Q = 1.5  Gain = -1.5 } }
          # Harshness / "tinny" cut — Lenny B chain calls for -2 dB at 2500.
          # This is THE band that makes a voice sound tinny when over-boosted.
          { type = builtin name = eq_harsh     label = bq_peaking   control = { Freq = 2500.0  Q = 2.0  Gain = -2.0 } }

          # ─── Sweetening boosts (gentler than v1) ───
          # Presence — +2.5 dB at 3 kHz (Lenny B says 2-3 kHz; we sit in that zone).
          { type = builtin name = eq_presence  label = bq_peaking   control = { Freq = 3000.0  Q = 1.0  Gain =  2.5 } }
          # Air — +2 dB at 8 kHz (Lenny B says 8 kHz, +3-4 dB; we go conservative).
          { type = builtin name = eq_air       label = bq_highshelf control = { Freq = 8000.0  Q = 0.7  Gain =  2.0 } }

          # 9. Compressor — same as v1: 4:1, -22 dB threshold, +10 dB makeup.
          { type = ladspa name = comp
            plugin = /usr/lib/ladspa/lsp-plugins-ladspa.so
            label  = "http://lsp-plug.in/plugins/ladspa/compressor_mono"
            control = {
              "Compression mode"      = 0
              "Sidechain mode"        = 1
              "Attack threshold (G)"  = 0.0794  # -22 dB
              "Release threshold (G)" = 0.0
              "Attack time (ms)"      = 5.0
              "Release time (ms)"     = 130.0
              "Ratio"                 = 4.0
              "Knee (G)"              = 0.501
              "Makeup gain (G)"       = 3.162   # +10 dB
            } }

          # 10. Limiter -1 dB.
          { type = ladspa name = lim
            plugin = /usr/lib/ladspa/lsp-plugins-ladspa.so
            label  = "http://lsp-plug.in/plugins/ladspa/limiter_mono"
            control = {
              "Operating mode"    = 0
              "Threshold (G)"     = 0.891
              "Lookahead (ms)"    = 5.0
              "Attack time (ms)"  = 4.0
              "Release time (ms)" = 6.0
            } }
        ]
        links = [
          { output = "hpf:Out"          input = "rnnoise:Input"   }
          { output = "rnnoise:Output"   input = "eq_body:In"      }
          { output = "eq_body:Out"      input = "eq_mud:In"       }
          { output = "eq_mud:Out"       input = "eq_box:In"       }
          { output = "eq_box:Out"       input = "eq_nasal:In"     }
          { output = "eq_nasal:Out"     input = "eq_harsh:In"     }
          { output = "eq_harsh:Out"     input = "eq_presence:In"  }
          { output = "eq_presence:Out"  input = "eq_air:In"       }
          { output = "eq_air:Out"       input = "comp:Input"      }
          { output = "comp:Output"      input = "lim:Input"       }
        ]
      }
      capture.props = {
        node.name      = "capture.voice_cleaned"
        node.passive   = true
        audio.rate     = 48000
        audio.channels = 1
        target.object  = "alsa_input.usb-Samson_Technologies_Samson_Q2U_Microphone-00.analog-stereo"
      }
      playback.props = {
        node.name        = "voice_cleaned"
        node.description = "Voice (Cleaned)"
        media.class      = Audio/Source
        audio.rate       = 48000
        audio.channels   = 1
        priority.session = 4000
      }
    }
  }
]
