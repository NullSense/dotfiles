# Put ~/.local/bin (and ~/bin) on the systemd --user manager PATH so that
# WM-spawned processes — waybar's `exec` / `on-click`, `uwsm app --`, etc. —
# can resolve user-installed binaries like `aiquota` and `codexbar` BY NAME,
# not just interactive zsh shells.
#
# Without this, bare `aiquota` in the waybar config silently no-ops because
# the systemd-user PATH lacks ~/.local/bin (the wrapper then has to fall back
# to a hardcoded path). environment.d is read by systemd --user at manager
# startup and inherited by every spawned service.
#
# Takes effect on next login, or immediately with:
#   systemctl --user import-environment PATH   # after exporting the new PATH
# (simplest is to re-login).
PATH=${HOME}/.local/bin:${HOME}/bin:${PATH}
