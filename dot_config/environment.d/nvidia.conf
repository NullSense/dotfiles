# Pin the Wayland compositor (Hyprland/Aquamarine) to the RTX 5090 ONLY.
#
# This box is still multi-GPU even after the RX 6750 XT was physically pulled:
# the Ryzen's integrated GPU (amdgpu, PCI 0d:00.0) is still enabled in BIOS and
# enumerates as card0. Both monitors are on the 5090 (card1). Without this pin,
# Aquamarine can pick card0 (the iGPU, which drives no displays) as primary and
# the session black-screens. X11/SDDM is unaffected, which is why the greeter
# shows but the Hyprland session fails.
#
# IMPORTANT: AQ_DRM_DEVICES is COLON-separated, so the value must NOT contain
# colons. A /dev/dri/by-path/pci-0000:01:00.0-card value gets split on its own
# ':' chars -> "Found no gpus to use" -> CBackend::create() crash. Use the plain
# card node. nvidia loads early from the initramfs and has consistently been
# card1 on this machine (verify: `for c in /sys/class/drm/card[0-9]; do echo
# $c $(grep DRIVER $c/device/uevent); done`). If it ever renumbers, update this
# (or, better, disable the iGPU in BIOS for a true single-GPU setup).
AQ_DRM_DEVICES=/dev/dri/card1
