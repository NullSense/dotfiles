# OMARCHY_PATH needs to be in systemd --user manager env from the moment the
# user manager starts, so EVERY user-spawned process inherits it — not just
# zsh shells (zshenv), not just uwsm-launched apps (uwsm/env, which is a
# oneshot read at session start only).
#
# Why this file over uwsm/env: uwsm's prepare-env runs ONCE at Hyprland-session
# start. wayland-wm-app-daemon.service (the gateway `uwsm app --` dispatches
# through) snapshots its env at that moment. After-the-fact edits to uwsm/env
# don't take effect until next login. environment.d/ is read by systemd --user
# at user-manager startup AND by every spawned service, so OMARCHY_PATH
# reaches uwsm_app-daemon → elephant → omarchy-theme-set children, fixing
# theme-picker enumeration AND omarchy-theme-set-templates render.
#
# Trap: if elephant launches `omarchy-theme-set` without OMARCHY_PATH set,
# templates silently no-op (TEMPLATES_DIR=$OMARCHY_PATH/default/themed → "/default/themed"
# → nullglob eats the loop), leaving current/theme/ with only 3 files
# (colors.toml, preview.png, waybar.css copy) — transparent walker, default
# Hyprland borders, missing source globbing errors at hyprland.conf:57.

OMARCHY_PATH=${HOME}/.local/share/omarchy
