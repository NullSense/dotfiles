# Make Bitwarden's SSH agent socket visible to every process the systemd user
# manager spawns — including Claude Code's subprocess git-clones, paru build
# helpers, and anything else that doesn't inherit env from your interactive
# shell.
#
# Note: systemd's environment.d expands %h to $HOME, but our env-reload
# script sources files via shell `.` which doesn't, so use the literal path.
SSH_AUTH_SOCK=/home/nullsense/.bitwarden-ssh-agent.sock
