# Wayland renderer hints applied to every user systemd-managed process.
# systemd-environment-d-generator(8) reads this file at user session start
# and exports each line into PAM, dbus, and systemd-user units alike.
#
# After editing, log out + back in OR run:
#   systemctl --user import-environment $(cut -d= -f1 wayland-overrides.conf | xargs)
#   then restart the apps.

# --- Electron (Bitwarden, Discord, Signal Desktop, VS Code, Slack, Postman, ghostty? no)
# Tells Electron 28+ to attempt the Wayland Ozone platform first and fall back
# to X11 only if Wayland init fails. Without this, Electron silently uses X11
# under XWayland, which can't do hi-DPI cleanly and renders blurry on scale != 1.
ELECTRON_OZONE_PLATFORM_HINT=wayland

# --- Qt (already set, but pin it here for systemd-managed Qt processes)
QT_QPA_PLATFORM=wayland;xcb
QT_WAYLAND_DISABLE_WINDOWDECORATION=1
# Qt's HiDPI auto-detection on Wayland — pixel-perfect at 2× scale.
QT_AUTO_SCREEN_SCALE_FACTOR=1

# --- Mozilla (already set; redundant but explicit)
MOZ_ENABLE_WAYLAND=1

# --- GDK (most GTK apps are native Wayland already; this forces it)
GDK_BACKEND=wayland,x11

# --- Java (Swing/AWT apps render through X11; this makes them attempt Wayland.
#     Caveat: very few JVM versions implement this fully. Mostly inert.)
_JAVA_AWT_WM_NONREPARENTING=1

# --- SDL (some games / emulators)
SDL_VIDEODRIVER=wayland

# --- sway compositor renderer
# Vulkan path on sway 1.12+ has measurably better integer-scale text antialiasing
# than the default GLES2 backend, and is mandatory for proper HDR + color
# management. Falls back to GLES2 on driver-init failure.
WLR_RENDERER=vulkan
