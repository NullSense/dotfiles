# Force apps that auto-detect to use their Wayland backend instead of XWayland.
# XWayland apps render at scale 1.0 and get bilinearly upscaled by the
# compositor → blurry on fractional scale (1.5x on the 4K). Native Wayland
# apps render at true pixel density and stay sharp at any scale.

GDK_BACKEND=wayland,x11
QT_QPA_PLATFORM=wayland;xcb
# Let sway draw the window borders, not Qt's client-side decorations.
QT_WAYLAND_DISABLE_WINDOWDECORATION=1
# sway already does HiDPI scaling — disable Qt's redundant auto-scaling so
# Telegram, electrum etc. don't double-scale.
QT_AUTO_SCREEN_SCALE_FACTOR=0
MOZ_ENABLE_WAYLAND=1
ELECTRON_OZONE_PLATFORM_HINT=auto
SDL_VIDEODRIVER=wayland,x11
CLUTTER_BACKEND=wayland
BEMENU_BACKEND=wayland
_JAVA_AWT_WM_NONREPARENTING=1
NIXOS_OZONE_WL=1

# Cursor — read by X11/XWayland apps and some Qt/GTK paths that don't go
# through gsettings. 32 looks right on 32" 4K @ 1.5× scale; bump to 40 for
# a chunkier feel.
XCURSOR_THEME=Adwaita
XCURSOR_SIZE=24
