<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Fontconfig — mixed QD-OLED + IPS-LCD, full-script coverage, web-CSS
  family-stack remapping so sites that hardcode `-apple-system`, `Segoe UI`,
  `Helvetica`, `Arial`, etc. resolve to high-quality installed fonts.

  Primary: AORUS FO32U2 (32" 4K QD-OLED, ~140 effective PPI at scale 1.25).
  Secondary: MSI MAG274QRF-QD (27" 1440p IPS, 109 PPI).

  QD-OLED has a triangular subpixel layout — RGB-stripe subpixel rendering
  causes color fringing. Fix: greyscale AA (rgba=none, lcdfilter=lcdnone).
-->
<fontconfig>
  <!-- ============================================================== -->
  <!-- Rendering quality                                                -->
  <!-- ============================================================== -->

  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="rgba" mode="assign"><const>none</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcdnone</const></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="autohint" mode="assign"><bool>false</bool></edit>
    <edit name="embeddedbitmap" mode="assign"><bool>false</bool></edit>
  </match>

  <!-- ============================================================== -->
  <!-- Generic family defaults                                          -->
  <!-- These are what most apps land on if they don't specify a font.   -->
  <!-- ============================================================== -->

  <alias binding="strong">
    <family>sans-serif</family>
    <prefer>
      <family>Inter</family>
      <family>Source Sans 3</family>
      <family>Roboto</family>
      <family>Noto Sans</family>
      <family>Source Han Sans SC</family>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans Arabic</family>
      <family>Noto Sans Hebrew</family>
      <family>Noto Sans Devanagari</family>
      <family>Noto Sans Thai</family>
      <family>Noto Color Emoji</family>
      <family>DejaVu Sans</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>serif</family>
    <prefer>
      <family>Source Serif 4</family>
      <family>Noto Serif</family>
      <family>Source Han Serif SC</family>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif Devanagari</family>
      <family>DejaVu Serif</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>monospace</family>
    <prefer>
      <family>Maple Mono NF</family>
      <family>JetBrains Mono</family>
      <family>Source Han Mono SC</family>
      <family>Noto Sans Mono CJK SC</family>
      <family>Noto Sans Mono</family>
      <family>DejaVu Sans Mono</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- ============================================================== -->
  <!-- Web font-stack remapping (FORCEFUL)                              -->
  <!-- Most websites use a CSS stack like:                              -->
  <!--   font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",    -->
  <!--                Roboto, Helvetica, Arial, sans-serif;             -->
  <!-- We use <match target="pattern"> with strong binding to override  -->
  <!-- both unknown families AND Arch's /etc/fonts/conf.d/30-metric-    -->
  <!-- aliases.conf which would otherwise route Arial → Liberation Sans -->
  <!-- and Helvetica → DejaVu — the source of the "Linux font jank"    -->
  <!-- look. Force everything through Inter / JetBrains Mono / Source. -->
  <!-- ============================================================== -->

  <!-- Macro for force-replacing one family name with another.
       Done as repeated <match> blocks because fontconfig has no real macro. -->

  <!-- macOS / iOS UI families → Inter -->
  <match target="pattern"><test qual="any" name="family"><string>system-ui</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>-apple-system</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>BlinkMacSystemFont</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>SF Pro</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>SF Pro Display</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>SF Pro Text</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>San Francisco</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Lucida Grande</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>

  <!-- macOS mono → JetBrains Mono -->
  <match target="pattern"><test qual="any" name="family"><string>SF Mono</string></test><edit name="family" mode="assign" binding="strong"><string>JetBrains Mono</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Menlo</string></test><edit name="family" mode="assign" binding="strong"><string>JetBrains Mono</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Monaco</string></test><edit name="family" mode="assign" binding="strong"><string>JetBrains Mono</string></edit></match>

  <!-- macOS serif → Source Serif 4 -->
  <match target="pattern"><test qual="any" name="family"><string>New York</string></test><edit name="family" mode="assign" binding="strong"><string>Source Serif 4</string></edit></match>

  <!-- Windows UI → Inter / Source / JetBrains -->
  <match target="pattern"><test qual="any" name="family"><string>Segoe UI</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Segoe UI Variable</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Segoe UI Emoji</string></test><edit name="family" mode="assign" binding="strong"><string>Noto Color Emoji</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Tahoma</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Calibri</string></test><edit name="family" mode="assign" binding="strong"><string>Source Sans 3</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Cambria</string></test><edit name="family" mode="assign" binding="strong"><string>Source Serif 4</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Consolas</string></test><edit name="family" mode="assign" binding="strong"><string>JetBrains Mono</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Courier New</string></test><edit name="family" mode="assign" binding="strong"><string>JetBrains Mono</string></edit></match>

  <!-- Generic web names — overrides Arch's metric-aliases for these -->
  <match target="pattern"><test qual="any" name="family"><string>Helvetica</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Helvetica Neue</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Arial</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Verdana</string></test><edit name="family" mode="assign" binding="strong"><string>Inter</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Times</string></test><edit name="family" mode="assign" binding="strong"><string>Source Serif 4</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Times New Roman</string></test><edit name="family" mode="assign" binding="strong"><string>Source Serif 4</string></edit></match>
  <match target="pattern"><test qual="any" name="family"><string>Georgia</string></test><edit name="family" mode="assign" binding="strong"><string>Source Serif 4</string></edit></match>
</fontconfig>
