# foot — used as the dropdown terminal (Mod+u) and for the clipboard
# picker (Mod+c). Visual-match to ghostty (Hack Nerd Font Mono, Gruvbox Dark Hard).

[main]
font=Hack Nerd Font Mono:size=8

# Ctrl+Plus/Minus changes font size WITHOUT resizing the window — the
# dropdown stays at its sway-set 2000x1300 and only the visible text grows
# or shrinks. (Default is `yes`, which is why the window kept growing.)
resize-keep-grid=no

# Don't constrain the window to integer multiples of cell size; pad to fit.
# Pairs naturally with resize-keep-grid=no.
resize-by-cells=no

# `yes` makes foot use the monitor's actual DPI for font sizing instead of
# rounding the compositor's scale factor. Combined with foot's wp_fractional_
# scale_v1 support (since 1.16), this gives pixel-perfect glyphs on the AORUS
# at scale 1.5. Note: foot 1.26 only accepts yes/no — `auto` is invalid.
dpi-aware=yes

pad=10x10

[scrollback]
lines=100000

# ============================================================
# Gruvbox Dark Hard — matches your ghostty theme
# foot 1.21+ wants [colors-dark] / [colors-light] for adaptive theming;
# plain [colors] works but emits deprecation warnings on every reload.
# ============================================================
[colors-dark]
foreground=ebdbb2
background=1d2021

regular0=282828
regular1=cc241d
regular2=98971a
regular3=d79921
regular4=458588
regular5=b16286
regular6=689d6a
regular7=a89984

bright0=928374
bright1=fb4934
bright2=b8bb26
bright3=fabd2f
bright4=83a598
bright5=d3869b
bright6=8ec07c
bright7=ebdbb2

[cursor]
style=block
blink=yes
