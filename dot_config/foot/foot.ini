# foot — used as the dropdown terminal (Mod+u) and for the clipboard
# picker (Mod+c). Visual-match to ghostty (Maple Mono NF, Gruvbox Dark Hard).

[main]
font=Maple Mono NF:size=12

# Ctrl+Plus/Minus changes font size WITHOUT resizing the window — the
# dropdown stays at its sway-set 2000x1300 and only the visible text grows
# or shrinks. (Default is `yes`, which is why the window kept growing.)
resize-keep-grid=no

# Don't constrain the window to integer multiples of cell size; pad to fit.
# Pairs naturally with resize-keep-grid=no.
resize-by-cells=no

# Honor the monitor's scale factor (so foot looks the same physical size
# on the 4K AORUS @ scale 1.5 and the 1440p MSI @ scale 1.0).
dpi-aware=no

pad=10x10

[scrollback]
lines=100000

# ============================================================
# Gruvbox Dark Hard — matches your ghostty theme
# ============================================================
[colors]
foreground=ebdbb2
background=1d2021

regular0=282828
regular1=cc241d
regular2=98971a
regular3=d79921
regular4=458588
regular5=b16286
regular6=689d6a
regular7=a89984

bright0=928374
bright1=fb4934
bright2=b8bb26
bright3=fabd2f
bright4=83a598
bright5=d3869b
bright6=8ec07c
bright7=ebdbb2

[cursor]
style=block
blink=yes
