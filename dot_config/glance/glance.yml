# Glance — homelab dashboard. ~/.local/bin/glance, hot-reloads on save. http://localhost:8088
# Tabs (in order): This machine · OnePlus-8T · Cortiq.
# DRY: shared cache windows are YAML anchors (&name on first use, *name after).
# URLs: Tailscale MagicDNS names for tailnet-reachable services (work from any tailnet node);
#       localhost only for loopback-bound services (llama-swap, observability). wakezilla lives
#       on the OnePlus phone (oneplus-8t-homelab), NOT on this machine.
server:
  host: 127.0.0.1
  port: 8088

branding:
  custom-footer: <p>nullsense · homelab</p>

theme:
  background-color: 222 13 11
  primary-color: 217 92 70
  positive-color: 135 44 55     # green = up
  negative-color: 0 70 60       # red = down
  contrast-multiplier: 1.15

pages:
  # ═══════════════════════════ 1 · THIS MACHINE (nullsense-arch) ═══════════════════════════
  - name: This machine
    width: wide
    columns:
      # LEFT — machine health
      - size: small
        widgets:
          - type: server-stats
            servers:
              - type: local
                name: nullsense-arch
                hide-mountpoints-by-default: true
                mountpoints:
                  "/": { hide: false, name: btrfs pool }
                  "/mnt/media-2tb": { hide: false, name: Media 2TB }
                  "/mnt/media-3tb": { hide: false, name: Media 3TB }
                  "/mnt/windows": { hide: false, name: Windows }
          - type: clock
            hour-format: 24h
          - type: bookmarks
            title: 🔐 agent-vault
            groups:
              - links:
                  - { title: HTTP proxy → :14321, url: "http://localhost:14321/" }
                  - { title: control → :14322, url: "http://localhost:14322/" }

      # CENTER — live health + docker
      - size: full
        widgets:
          # service-status cards generated from the registry by stack/gen-glance-services.py
          # (only currently-listening ports are shown). Re-run on `stack up` to refresh.
          - $include: this-machine-services.yml
          - type: docker-containers
            title: Docker containers
            running-only: true
            format-container-names: true

      # RIGHT — endpoints + stack commands + releases
      - size: small
        widgets:
          - type: bookmarks
            title: Stack endpoints
            groups:
              - title: Gateway & UI
                links:
                  - { title: "litellm · :4000/ui", url: "http://nullsense-arch:4000/ui/", icon: si:openai }
                  - { title: "llama-swap · :9292/ui", url: "http://localhost:9292/ui/", icon: si:nvidia }
                  - { title: "Open WebUI · :8090", url: "http://nullsense-arch:8090/", icon: si:openwebui }
              - title: Observability
                links:
                  - { title: "Langfuse · :3002", url: "http://localhost:3002/", icon: di:langfuse }
                  - { title: "Grafana · :3000", url: "http://localhost:3000/", icon: di:grafana }
                  - { title: "Uptime Kuma · :3009", url: "http://localhost:3009/" }
          - type: bookmarks
            title: stack commands  ·  ~/bin/stack
            groups:
              - links:
                  - { title: "stack up — llama-swap + litellm + dashboards", url: "http://nullsense-arch:4000/ui/" }
                  - { title: "stack obs — Grafana / Tempo / Langfuse", url: "http://localhost:3000/" }
                  - { title: "stack status — health + loaded models", url: "http://localhost:9292/ui/" }
                  - { title: "stack logs — tail litellm + llama-swap", url: "http://localhost:9292/ui/" }
          - type: releases
            title: Tooling updates
            cache: 6h
            repositories:
              - glanceapp/glance
              - BerriAI/litellm
              - mostlygeek/llama-swap
              - ggml-org/llama.cpp

  # ═══════════════════════════ 2 · ONEPLUS-8T (oneplus-8t-homelab) ═══════════════════════════
  - name: OnePlus-8T
    width: wide
    columns:
      - size: full
        widgets:
          - $include: oneplus-services.yml
          - type: monitor
            title: Desktop reachability  (health only — does NOT wake)
            cache: 30s
            sites:
              - { title: "wakezilla health · nullsense-arch:3001", url: "http://nullsense-arch:3001/" }

      - size: small
        widgets:
          - type: bookmarks
            title: OnePlus admin (.home)
            groups:
              - links:
                  - { title: AdGuard, url: "http://adguard.home/", icon: di:adguard-home }
                  - { title: Home Assistant, url: "http://ha.home/", icon: di:home-assistant }
          - type: bookmarks
            title: Actions
            groups:
              - title: Wake desktop
                links:
                  - { title: "⏻ Wake nullsense-arch", url: "http://oneplus-8t-homelab:8080/wake/nullsense-arch" }
              - title: Shell
                links:
                  - { title: "SSH · oneplus-8t-homelab:22", url: "ssh://u0_a171@oneplus-8t-homelab" }

  # ═══════════════════════════ 3 · CORTIQ (generated: scripts/gen-glance) ═══════════════════════════
  - $include: cortiq.yml
