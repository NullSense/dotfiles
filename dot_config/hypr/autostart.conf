# Autostart — `exec-once` runs once per session start (≈ sway's `exec`),
# `exec` runs on every config reload (≈ sway's `exec_always`).
#
# We wrap most launches with `uwsm app -- ` (when uwsm is installed). This
# turns each app into a transient systemd user unit, which gives us:
#   - Clean teardown of every spawned app on Hyprland exit
#   - Resource accounting via systemd-cgtop
#   - Apps don't get leaked if Hyprland dies
#
# Ordering rationale (Hyprland exec-once fires roughly in declaration order):
#   1. Session env propagation FIRST so anything launched via `uwsm app` /
#      `systemctl --user` has DISPLAY, HYPRLAND_INSTANCE_SIGNATURE, etc.
#   2. Background daemons (notification, clipboard, polkit, idle).
#   3. Wallpaper + tray daemons (gammarelay, playerctld).
#   4. WAYBAR — must come BEFORE chat apps, otherwise tray-using apps
#      (Telegram, Signal, Bitwarden) try to register their SNI items before
#      `org.kde.StatusNotifierWatcher` exists, get ServiceUnknown errors,
#      and silently never show their tray icons (most apps don't retry).
#   5. Chat / browser / terminal apps last.
#
# NB: nm-applet, blueman-applet, and bitwarden-desktop also have XDG
# autostart entries (in /etc/xdg/autostart/ resp. ~/.config/autostart/) which
# uwsm fires via `wayland-session-xdg-autostart@hyprland.desktop.target`. We
# DO NOT duplicate them as exec-once here — the duplicate would race and
# spam "Status Notifier Item ... already registered" warnings.

# --- 1. Session env propagation (must run first) ----------------------------
exec-once = systemctl --user import-environment HYPRLAND_INSTANCE_SIGNATURE WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP DISPLAY
exec-once = dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP DISPLAY

# --- 2. Background daemons (long-running, benefit from systemd unit tracking) ---
exec-once = uwsm app -- mako
exec-once = uwsm app -- udiskie -t

# Polkit agent (Hyprland's polkit GUI prompt)
exec-once = systemctl --user start hyprpolkitagent

# Clipboard history with password-manager filter
exec-once = uwsm app -- sh -c 'wl-paste --watch sh -c "wl-paste --list-types 2>/dev/null | grep -qi x-kde-passwordManagerHint || cliphist store"'

# Idle daemon — replaces swayidle
exec-once = uwsm app -- hypridle

# Color/brightness DBus daemon — controlled by waybar pills
exec-once = uwsm app -- wl-gammarelay-rs

# MPRIS most-recently-active tracker
exec-once = uwsm app -- playerctld daemon

# --- 3. Launchers (resident GTK apps, summoned via keybindings) -------------
# Vicinae launcher
exec-once = sh -c 'command -v vicinae >/dev/null 2>&1 && uwsm app -- vicinae server >/dev/null 2>&1 || true'

# Walker launcher — keeps elephant data provider + walker GTK app resident
exec-once = sh -c 'command -v elephant >/dev/null 2>&1 && uwsm app -- elephant >/dev/null 2>&1 || true'
exec-once = sh -c 'command -v walker >/dev/null 2>&1 && sleep 0.3 && uwsm app -- env GSK_RENDERER=cairo walker --gapplication-service >/dev/null 2>&1 || true'

# Dropdown terminal — pre-spawns into special:dropdown workspace.
# ghostty --class= sets the wayland app-id so the windowrule for
# class=dropdown_term in monitors.conf places it correctly.
exec-once = uwsm app -- ghostty --class=dropdown_term

# --- 4. Wallpaper (awww — drop-in fork of swww) -----------------------------
exec-once = uwsm app -- awww-daemon
exec-once = sh -c 'sleep 0.5 && awww img --transition-type=none ~/Pictures/wallpaper.png 2>/dev/null || awww clear "282828"'

# --- 5. Theme application (every reload) ------------------------------------
exec = ~/bin/theme-apply

# --- 6. Waybar (must precede tray-using apps for SNI registration) ---------
# Supervised by systemd (~/.config/systemd/user/waybar.service) — the unit
# has Restart=on-failure + StartLimitBurst, replacing the old hand-rolled
# waybar-keeper supervisor loop. Reload config without restart via
# `systemctl --user reload waybar` (sends SIGUSR2). Tail logs with
# `journalctl --user -u waybar -f`.
exec-once = systemctl --user start waybar.service

# --- 7. Initial app placement on workspaces ---------------------------------
# Each app gets its own systemd transient unit via `uwsm app`, so logout
# cleanly stops every browser tab + chat client + terminal. These come AFTER
# waybar so the StatusNotifierWatcher exists when they try to register tray
# icons.
#
# Electron tray hack: Electron's libappindicator integration only initialises
# when XDG_CURRENT_DESKTOP looks Unity/KDE/XFCE-like. Under Hyprland it
# silently skips tray init, which is why Bitwarden/Signal/Discord were
# invisible in waybar even with libappindicator + libayatana installed and
# the StatusNotifierWatcher already up. Prefix `env XDG_CURRENT_DESKTOP=Unity`
# scoped to the app process so the rest of the session keeps the real value.
exec-once = [workspace 1 silent] uwsm app -- helium --force-device-scale-factor=1 --enable-features=UseOzonePlatform --ozone-platform=wayland
exec-once = [workspace 2 silent] uwsm app -- ghostty
exec-once = uwsm app -- env XDG_CURRENT_DESKTOP=Unity bitwarden-desktop --hidden
exec-once = [workspace 3 silent] uwsm app -- env XDG_CURRENT_DESKTOP=Unity signal-desktop --force-device-scale-factor=1.5 --enable-features=UseOzonePlatform --ozone-platform=wayland
exec-once = [workspace 3 silent] uwsm app -- env XDG_CURRENT_DESKTOP=Unity discord --force-device-scale-factor=1.5 --enable-features=UseOzonePlatform --ozone-platform=wayland
exec-once = [workspace 3 silent] uwsm app -- sh -c 'QT_SCALE_FACTOR=0.75 Telegram'
