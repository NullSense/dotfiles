# Keybindings — direct translation from sway with Hyprland equivalents.
#
# bind     — basic
# bindl    — fires even when locked (matches sway --locked)
# binde    — repeats while held
# bindel   — locked + repeats (volume keys when locked)
# bindd    — same as bind but with description (shows in `hyprctl binds`)
# bindgesture — touchpad gestures (we use built-in `gestures` block instead)
# submap   — modal mode (resize, system, media)

# ============================================================================
# Apps
# ============================================================================

bindd = $mod, Return,  Open terminal,             exec, $term
bindd = $mod, d,       App launcher,              exec, /home/nullsense/bin/launch-walker
bindd = $mod SHIFT, d, Run command,               exec, /home/nullsense/bin/launch-walker -m runner
bindd = $mod, Tab,     Window switcher,           exec, /home/nullsense/bin/launch-walker -m windows
bindd = $mod, b,       Bitwarden copy,            exec, /home/nullsense/bin/walker-rbw copy
bindd = $mod SHIFT, b, Bitwarden type,            exec, /home/nullsense/bin/walker-rbw type

# Vicinae — Raycast-style launcher. $mod+space is the Raycast convention.
# `vicinae toggle` shows/hides the window (server runs in autostart).
# Falls back to no-op if vicinae isn't installed yet.
bindd = $mod, space,  Vicinae launcher,          exec, vicinae toggle

# Discoverability — show all keybinds in fzf (omarchy-style)
bindd = $mod, slash,  Show keybindings,     exec, foot --app-id=floating-monitor ~/bin/keybinds

# Localhost services picker — scans `ss` for listeners, opens chosen one in browser.
# Labels live in ~/.config/services.toml.
bindd = $mod, s,      Localhost services,   exec, ~/bin/services

# OCR — select an area, extract text, copy to clipboard.
# Uses tesseract under the hood. `~/bin/ocr <lang>` for non-English (e.g. jpn+eng).
bindd = $mod SHIFT, t, OCR text from screen, exec, ~/bin/ocr

# Color picker — eyedropper, copies hex to clipboard.
bindd = $mod SHIFT, c, Color picker (hex),   exec, ~/bin/colorpick

# Dropdown terminal — toggle the special:dropdown workspace
bindd = $mod, u,      Dropdown terminal,    togglespecialworkspace, dropdown

# Dropdown Spotify — toggle the special:spotify workspace
bindd = $mod, m,      Dropdown Spotify,     togglespecialworkspace, spotify

# Voice dictation (whisrs + Parakeet TDT v3 on ROCm). Tap to start, tap again to stop+transcribe.
# Toggle (not hold) avoids uinput injecting characters with stuck modifiers held → no Ctrl/Alt
# interpreted as system shortcuts when text is typed back.
bindd = SUPER ALT,       Space, Voice dictation,  exec, whisrs toggle
bindd = SUPER ALT SHIFT, Space, Cancel dictation, exec, whisrs cancel

# ============================================================================
# Screenshot — the smart router script handles area/window/monitor selection
# ============================================================================

# Capture — Print opens the omarchy-style menu (screenshot / record / picker / OCR).
# Direct binds kept for muscle memory and power-user paths.
bindd = , Print,                Capture menu,            exec, /home/nullsense/bin/capture-menu
bindd = SHIFT, Print,           Region screenshot,       exec, /home/nullsense/bin/screenshot region
bindd = CTRL, Print,            Window screenshot,       exec, /home/nullsense/bin/screenshot windows
bindd = ALT, Print,             Fullscreen screenshot,   exec, /home/nullsense/bin/screenshot fullscreen
bindd = SUPER, Print,           Color picker,            exec, pkill hyprpicker || hyprpicker -a
bindd = SUPER CTRL, Print,      OCR text from screen,    exec, /home/nullsense/bin/ocr
bindd = SUPER ALT, r,           Screen recording,        exec, /home/nullsense/bin/screenrecord
bindd = SUPER ALT SHIFT, r,     Record + desktop audio,  exec, /home/nullsense/bin/screenrecord --with-desktop-audio
bindd = SUPER CTRL ALT, r,      Record + mic audio,      exec, /home/nullsense/bin/screenrecord --with-microphone-audio

# ============================================================================
# Clipboard
# ============================================================================

bindd = $mod, Insert,             Show clipboard,        exec, notify-send -t 2000 "$(wl-paste)"
bindd = $mod, c,                  Clipboard history,     exec, sh -c 'cliphist list | /home/nullsense/bin/launch-walker --dmenu --placeholder "Clipboard" | cliphist decode | wl-copy'
bindd = $mod SHIFT, Insert,       Upload clipboard,      exec, sh -c 'wl-paste | /home/nullsense/bin/0x0'
bindd = $mod CTRL, Insert,        Escape clipboard,      exec, /home/nullsense/bin/escaper

# ============================================================================
# Media — playerctld picks most-recently-active player
# ============================================================================

bindl = $mod, p,         exec, playerctl play-pause
bindl = $mod SHIFT, p,   exec, playerctl previous
bindl = $mod CTRL, p,    exec, playerctl next
bindl = $mod ALT, p,     exec, playerctld shift
bindl = , XF86AudioPlay, exec, playerctl play-pause
bind  = , XF86AudioPrev, exec, playerctl previous
bind  = , XF86AudioNext, exec, playerctl next

# Media submap — Mod+Shift+m enters; press q/Esc/Return to exit
bindd = $mod SHIFT, m, Enter media mode, submap, media
submap = media
binde = , space,        exec, playerctl play-pause
binde = , n,            exec, playerctl next
binde = , p,            exec, playerctl previous
binde = , bracketright, exec, playerctl position 5+
binde = , bracketleft,  exec, playerctl position 5-
binde = , equal,        exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , minus,        exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , s,            togglespecialworkspace, spotify
bind  = , c,            exec, playerctld shift
bind  = , Return, submap, reset
bind  = , Escape, submap, reset
bind  = , q,      submap, reset
submap = reset

# ============================================================================
# Audio (PipeWire-native via wpctl)
# ============================================================================

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ============================================================================
# Brightness (DDC/CI via brightness-ctl wrapper — synced across monitors)
# ============================================================================

bindel = , XF86MonBrightnessUp,   exec, ~/bin/brightness-ctl +10
bindel = , XF86MonBrightnessDown, exec, ~/bin/brightness-ctl -10
bindel = $mod, equal,             exec, ~/bin/brightness-ctl +10
bindel = $mod, minus,             exec, ~/bin/brightness-ctl -10
bindl  = $mod SHIFT, equal,       exec, ~/bin/brightness-ctl 100
bindl  = $mod SHIFT, minus,       exec, ~/bin/brightness-ctl 30

# ============================================================================
# VRR / FreeSync toggle (gaming) — Hyprland equivalent of `output DP-1 adaptive_sync toggle`
# Bound on $mod+Shift+v (mnemonic: V = VRR). Was on $mod+Shift+f, but $mod+Shift+f
# is now the canonical fake-fullscreen for screensharing.
# ============================================================================

bindd = $mod SHIFT, v, Toggle VRR / FreeSync, exec, sh -c 'cur=$(hyprctl getoption -j misc:vrr | jq .int); new=$(( cur ^ 1 )); hyprctl keyword misc:vrr $new; notify-send "Adaptive Sync" "$([ $new -eq 1 ] && echo on || echo off)"'

# ============================================================================
# Lock & system mode
# ============================================================================

bindd = CTRL ALT, Delete, Lock screen, exec, hyprlock

# Power menu — Omarchy-style full-screen icon grid via wlogout.
# Single-key actions inside: l=lock  e=logout  u=suspend  r=reboot  s=shutdown
# Esc cancels. -p layer-shell makes it overlay properly on Hyprland.
bindd = CTRL, Delete, Power menu, exec, pkill wlogout || wlogout -p layer-shell

# ============================================================================
# Window management
# ============================================================================

bindd = $mod SHIFT, q, Kill window, killactive,

# Focus
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

# Move window
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r

# Layout
bind = $mod, e,           layoutmsg, togglesplit
bind = $mod SHIFT, space, togglefloating,

# ----- Window states ---------------------------------------------------------
# Hyprland has three "big window" modes, each with a different use case:
#   fullscreen 1               — maximize (under bar, gaps kept).  Everyday.
#   fullscreen 0               — exclusive (covers bar).            Games/video.
#   fullscreenstate, 0, 2      — fake fullscreen: window renders at tile size
#                                but the *client* thinks it's fullscreen.
#                                For screensharing / theater-mode YouTube.
#                                (Replaces the deprecated `fakefullscreen`.)
bindd = $mod, f,            Maximize (under bar),     fullscreen, 1
bindd = $mod CTRL, f,       Exclusive fullscreen,     fullscreen, 0
bindd = $mod SHIFT, f,      Fake fullscreen (share),  fullscreenstate, 0, 2
bindd = $mod, p,            Pin (across workspaces),  exec, sh -c 'hyprctl activewindow -j | grep -q "\"floating\": false" && hyprctl dispatch togglefloating; hyprctl dispatch pin'
bindd = $mod SHIFT, p,      Pseudotile,               pseudo
bindd = $mod CTRL, Return,  Center floating window,   centerwindow

# ----- Window groups (sway "tabbed/stacked" equivalent) ---------------------
# togglegroup turns the focused window into a tabbed group container.
# lockactivegroup `lock` makes new splits land *inside* the group (stack mode).
# moveintogroup / moveoutofgroup directionally add or eject windows.
# changegroupactive cycles which tab is visible.
bindd = $mod, w,            Toggle window group, togglegroup,
bindd = $mod SHIFT, w,      Lock group (new windows join), lockactivegroup, toggle
bindd = $mod ALT, h,        Move into group (left),  moveintogroup, l
bindd = $mod ALT, j,        Move into group (down),  moveintogroup, d
bindd = $mod ALT, k,        Move into group (up),    moveintogroup, u
bindd = $mod ALT, l,        Move into group (right), moveintogroup, r
bindd = $mod ALT, u,        Eject from group,        moveoutofgroup,
bindd = $mod, bracketleft,  Group: prev tab,         changegroupactive, b
bindd = $mod, bracketright, Group: next tab,         changegroupactive, f
# NOTE: $mod+space was previously `cyclenext` — moved to vicinae launcher above.
# Window cycling stays available via h/j/k/l movefocus binds below.
bind = $mod, a,           focuscurrentorlast,  # ≈ `focus parent` (closest analog)

# Mouse drag-to-move (replaces sway `floating_modifier $mod`)
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ============================================================================
# Workspaces
# ============================================================================

# Move focused workspace between monitors (sway: move workspace to output left/right)
bindd = $mod, less,    Move workspace to left monitor,  movecurrentworkspacetomonitor, l
bindd = $mod, greater, Move workspace to right monitor, movecurrentworkspacetomonitor, r

# ----- Workspace navigation (Hyprland-native patterns) ----------------------
# +1/-1   = next/prev workspace      (cycles through existing)
# e+1/e-1 = next/prev *empty*        (sway-style — finds a free one)
# m+1/m-1 = next/prev on *this monitor*
# previous= toggle to last visited (alt-tab for workspaces)
bindd = $mod CTRL, l,       Next workspace,         workspace, +1
bindd = $mod CTRL, h,       Prev workspace,         workspace, -1
bindd = $mod, grave,        Last workspace,         workspace, previous
bindd = $mod CTRL SHIFT, l, Next empty workspace,   workspace, e+1
bindd = $mod CTRL SHIFT, h, Prev empty workspace,   workspace, e-1
# Scroll on the bar/desktop changes workspace too
bindd = $mod, mouse_down,   Workspace scroll +,     workspace, m+1
bindd = $mod, mouse_up,     Workspace scroll -,     workspace, m-1

# ----- Multi-monitor focus --------------------------------------------------
bindd = $mod, period,       Focus next monitor,     focusmonitor, +1
bindd = $mod, comma,        Focus prev monitor,     focusmonitor, -1

# ----- Window cycling (alt-tab style) ---------------------------------------
bindd = $mod, n,            Cycle next window,      cyclenext
bindd = $mod SHIFT, n,      Cycle prev window,      cyclenext, prev
bindd = $mod, x,            Bring float to front,   bringactivetotop

# Switch to workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move container to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Reload Hyprland config (≈ sway's `bindsym $mod+Shift+r reload`)
bindd = $mod SHIFT, r, Reload Hyprland, exec, hyprctl reload

# ============================================================================
# Resize submap
# ============================================================================

bindd = $mod, r, Resize mode, submap, resize
submap = resize
binde = , h,     resizeactive, -20 0
binde = , j,     resizeactive, 0 20
binde = , k,     resizeactive, 0 -20
binde = , l,     resizeactive, 20 0
binde = , Left,  resizeactive, -20 0
binde = , Down,  resizeactive, 0 20
binde = , Up,    resizeactive, 0 -20
binde = , Right, resizeactive, 20 0
bind  = , Return, submap, reset
bind  = , Escape, submap, reset
bind  = $mod, r, submap, reset
submap = reset
