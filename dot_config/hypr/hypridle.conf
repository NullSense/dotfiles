# Hypridle — OLED-aware tiered idle management for AORUS FO32U2 + MSI MAG274QRF-QD.
#
# Strategy (desktop, no battery) — tiered like macOS, with a "warning shot"
# pre-dim before lock so a quick mouse move bails you out cleanly:
#
#   2 min idle   → pre-dim both monitors to 30% (reversible; on-resume restores)
#   3 min idle   → loginctl lock-session
#                  → on_lock_cmd: dim to 10% (OLED-safe floor; at 0% PWM
#                    flickers on the FO32U2)
#   4 min idle   → per-monitor power-down (see hypridle-suspend.sh)
#                  → on-resume: hypridle-resume.sh
#   before sleep → lock
#   after  sleep → hypridle-resume.sh
#
# Why per-monitor at 4 min (was: blanket DDC D6=04 to all displays):
#   Diagnosed 2026-05-09 — the MSI MAG274QRF-QD silently rejects DDC D6=04
#   writes (DDCRC_VERIFY on the verify-readback) and its `getvcp D6` then
#   *lies* — reports 01 while the panel is dark, so we can't even tell from
#   software that the write didn't take. Wake bytes hit a panel that's already
#   in some non-spec sleep state and require a physical power-button press
#   to recover.
#
#   New design: OLED keeps D6=04 (panel honors it; required for burn-in
#   protection). MSI uses brightness=0 (VCP 10) — well-tested write path,
#   actually extinguishes the LCD backlight, fully reversible without DDC
#   register lies. Plus DPMS off as a generic blanket.
#
#   Wake sequence puts DPMS on FIRST so the DP link / AUX channel is alive
#   before any DDC byte travels. Old order (DDC first) silently dropped wake
#   commands on DP-2 when the link was down.
#
# State file /tmp/brightness-pre-lock holds the pre-tier brightness so unlock /
# resume can restore it. The save is *idempotent* — only the first dim writes
# the file, so a pre-dim → lock chain doesn't clobber the real working level.
#
# We use ~/bin/brightness-ctl (DDC/CI wrapper, syncs all monitors) instead of
# `brightnessctl` (which only controls /sys/class/backlight — laptop panels).

general {
    lock_cmd          = pidof hyprlock || hyprlock
    unlock_cmd        = sh -c '[ -f /tmp/brightness-pre-lock ] && ~/bin/brightness-ctl "$(cat /tmp/brightness-pre-lock)" && rm -f /tmp/brightness-pre-lock'
    on_lock_cmd       = sh -c '[ -f /tmp/brightness-pre-lock ] || ~/bin/brightness-ctl get > /tmp/brightness-pre-lock; ~/bin/brightness-ctl 10'
    on_unlock_cmd     = sh -c '[ -f /tmp/brightness-pre-lock ] && ~/bin/brightness-ctl "$(cat /tmp/brightness-pre-lock)" && rm -f /tmp/brightness-pre-lock'
    before_sleep_cmd  = loginctl lock-session
    after_sleep_cmd   = ~/bin/hypridle-resume.sh
    ignore_dbus_inhibit    = false
    ignore_systemd_inhibit = false
    # NOTE: `inhibit_sources` is hypridle-wide, not per-listener — setting it
    # to `audio` (the obvious "don't dim while Spotify plays" choice) silently
    # blocked the 2-min pre-dim and 3-min lock too, manifesting as "the MSI
    # sometimes doesn't dim". Removed 2026-05-11. If you want media playback
    # to keep screens awake, rely on apps submitting systemd-inhibit locks
    # (mpv does this; browsers do for fullscreen video). `ignore_systemd_inhibit
    # = false` above already honors those.
}

# 2 min — pre-dim warning shot. Idempotent save so we don't clobber the
# real brightness if lock fires next.
listener {
    timeout    = 120
    on-timeout = sh -c '[ -f /tmp/brightness-pre-lock ] || ~/bin/brightness-ctl get > /tmp/brightness-pre-lock; ~/bin/brightness-ctl 30'
    on-resume  = sh -c '[ -f /tmp/brightness-pre-lock ] && ~/bin/brightness-ctl "$(cat /tmp/brightness-pre-lock)" && rm -f /tmp/brightness-pre-lock'
}

# 3 min — lock. on_lock_cmd above handles the dim-to-floor.
listener {
    timeout    = 180
    on-timeout = loginctl lock-session
}

# 4 min — power down per-monitor. See hypridle-suspend.sh / hypridle-resume.sh.
listener {
    timeout    = 240
    on-timeout = ~/bin/hypridle-suspend.sh
    on-resume  = ~/bin/hypridle-resume.sh
}

# Auto-suspend intentionally disabled for this desktop — long-running services
# (agent-vault, hyprwhspr, background agents) shouldn't be paused. Bind a key
# in hyprland for explicit `systemctl suspend` if you want manual access.
