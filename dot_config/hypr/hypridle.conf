# Hypridle — OLED-aware idle management for the AORUS FO32U2 + portrait MSI.
#
# Strategy (desktop, no battery):
#   on lock      → save current brightness, dim both monitors to 10% (OLED-safe
#                  floor — at 0% PWM kicks in and flickers)
#   on unlock    → restore prior brightness on every monitor via DDC/CI
#   5  min idle  → loginctl lock-session (triggers above on_lock_cmd)
#   7  min idle  → DPMS off (panels actually power down)
#   resume       → DPMS on
#   before sleep → lock; after sleep → DPMS on
#
# We use ~/bin/brightness-ctl (DDC/CI wrapper, syncs all monitors) instead of
# `brightnessctl` (which only controls /sys/class/backlight — laptop panels).
#
# State file /tmp/brightness-pre-lock holds the pre-lock brightness so we can
# restore it on unlock without guessing.

general {
    lock_cmd          = pidof hyprlock || hyprlock
    unlock_cmd        = sh -c '[ -f /tmp/brightness-pre-lock ] && ~/bin/brightness-ctl "$(cat /tmp/brightness-pre-lock)" && rm -f /tmp/brightness-pre-lock'
    on_lock_cmd       = sh -c '~/bin/brightness-ctl get > /tmp/brightness-pre-lock; ~/bin/brightness-ctl 10'
    on_unlock_cmd     = sh -c '[ -f /tmp/brightness-pre-lock ] && ~/bin/brightness-ctl "$(cat /tmp/brightness-pre-lock)" && rm -f /tmp/brightness-pre-lock'
    before_sleep_cmd  = loginctl lock-session
    after_sleep_cmd   = hyprctl dispatch dpms on
    ignore_dbus_inhibit    = false
    ignore_systemd_inhibit = false
    inhibit_sources        = audio
}

# Lock at 5 min (this also dims via on_lock_cmd above)
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}

# DPMS off 2 min after lock (panels powered down — protects OLED long-term)
listener {
    timeout    = 420
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# Suspend at 30 min — keep commented for desktop; uncomment if it ever moves to
# a laptop-only setup.
