# Hyprland — top-level config.
# Modular: each concern lives in its own file; this file just sources them.
# Inspired by Omarchy's structure but written from scratch for our setup.
#
# Goal: faithful sway → Hyprland translation, preserving every keybind and
# window rule, while gaining native auto-HDR, animations, and dropping
# kanshi (replaced by native monitors.conf) and swayidle (replaced by hypridle).
#
# Reference docs: https://wiki.hypr.land/

# --- Variables (referenced by other files) ------------------------------------
$mainMod   = SUPER
$term      = alacritty
$browser   = helium
$mod       = SUPER

# Gruvbox Dark Hard palette (mirrors sway $bg/$fg/$accent set vars)
$bgd       = rgb(282828)
$bgs       = rgb(32302f)
$bg1       = rgb(3c3836)
$bg2       = rgb(504945)
$bg3       = rgb(665c54)
$fg3       = rgb(bdae93)
$fg2       = rgb(d5c4a1)
$fg1       = rgb(ebdbb2)
$fg0       = rgb(fbf1c7)
$red       = rgb(cc241d)
$green     = rgb(b8bb26)
$yellow    = rgb(fabd2f)
$blue      = rgb(83a598)
$purple    = rgb(d3869b)
$aqua      = rgb(83c07c)
$orange    = rgb(d65d0e)

# --- Omarchy upstream defaults (read-only, refreshed by `git -C ~/.local/share/omarchy pull`)
# These define the menu bindings (SUPER+ALT+SPACE → omarchy-menu), capture
# bindings (PRINT, ALT+PRINT, SUPER+CTRL+PRINT for OCR), tiling-v2 binds,
# media/clipboard binds, default windowrules, and active-border colors.
# Skipped: omarchy's autostart.conf — too much overlap with our awww/dunst/
# hyprpolkitagent stack; we keep ours.
source = ~/.local/share/omarchy/default/hypr/autostart.conf
source = ~/.local/share/omarchy/default/hypr/bindings/media.conf
source = ~/.local/share/omarchy/default/hypr/bindings/clipboard.conf
# tiling-v2.conf intentionally NOT sourced — it conflicts with our hjkl
# focus/move binds (SUPER+J = togglesplit hijacked focus-down, etc.) and
# Hyprland `unbind` doesn't reliably remove `bindd` entries. Our
# bindings.conf owns all tiling/focus/window-state binds instead.
# source = ~/.local/share/omarchy/default/hypr/bindings/tiling-v2.conf
source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
source = ~/.local/share/omarchy/default/hypr/envs.conf
# omarchy upstream looknfeel.conf NOT sourced: as of Hyprland 0.55.x it emits
# 3 errors (gradient -1, dwindle:pseudotile removed) and we fully override its
# general/decoration/group/animations/dwindle blocks in our own looknfeel.conf
# below anyway. Re-enable once upstream omarchy ships fixes (then we can drop
# duplicated blocks from our looknfeel.conf).
# source = ~/.local/share/omarchy/default/hypr/looknfeel.conf
source = ~/.local/share/omarchy/default/hypr/input.conf
source = ~/.local/share/omarchy/default/hypr/windows.conf

# --- Theme-driven Hyprland colors (window borders, etc.) — flipped by
# omarchy-theme-set, regenerated each switch. Optional via the `?:` guard.
source = ~/.config/omarchy/current/theme/hyprland.conf

# --- OUR overrides (must come after omarchy so we win on conflicts) ----------
# - env.conf:       Wayland env exports
# - monitors.conf:  AORUS QD-OLED bitdepth=10, MSI scale=1.0, eDP scale=1.5,
#                   special:dropdown workspace handler (alacritty --class)
# - input.conf:     mouse/touchpad tuning
# - looknfeel.conf: gruvbox border colors (will move to theme later)
# - windows.conf:   per-app rules (Bitwarden float, etc.)
# - bindings.conf:  hyprwhspr push-to-talk + our $mod-bindings
# - autostart.conf: 7-phase startup (env propagation, daemons, waybar, apps)
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/windows.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/autostart.conf

# --- Omarchy toggle state (gaps off, transparency off, etc.) -----------------
# Created/destroyed by omarchy-toggle-* scripts; safe even when empty.
source = ~/.local/state/omarchy/toggles/hypr/*.conf

# --- Misc one-liners that don't fit a section --------------------------------
# Match sway's `focus_follows_mouse no`.
general {
    no_focus_fallback = false
}
misc {
    focus_on_activate = true
    disable_hyprland_logo = true
    disable_splash_rendering = true
    # `misc:vfr` removed in Hyprland 0.55.x — VFR is now unconditional.
    # vrr 2 = adaptive sync for fullscreen apps only. Keeps VRR off the desktop,
    # which is what causes OLED brightness flicker (rapid refresh swings on the
    # idle desktop). Chose 2 over 3 (content-type-gated): 3 silently drops VRR on
    # any game that doesn't self-tag, while 2 just works for every fullscreen app.
    vrr = 2

    # Sway equivalent: focus_follows_mouse no
    mouse_move_focuses_monitor = true
}
input {
    follow_mouse = 0   # = focus_follows_mouse no
    # Even with follow_mouse=0, floating windows still steal focus when the
    # cursor passes over them (this is the default `=1`). That's what made the
    # pinned/floating mpv grab focus on hover. 0 = never override focus for floats.
    float_switch_override_focus = 0
}

# Pinned (sticky) windows can't go fullscreen by default — Hyprland rejects the
# request, which is why SUPER+F / SUPER+CTRL+F *and* mpv's own `f` did nothing on
# the floating+pinned mpv (windows.conf pins mpv via `pin on`). Enabling this let
# a pinned window fullscreen without first unpinning. (Hyprland #1147)
#
# DISABLED 2026-06-06 — this was the direct trigger of a hard Hyprland crash.
# Maximizing the pinned+floating mpv fired a client fullscreen request
# (CWindow::onUpdateState -> changeWindowFullscreenModeClient) that reaches the
# new 0.55 layout engine's Layout::CAlgorithm::recalculate(), which throws an
# uncaught std::bad_variant_access -> SIGABRT. Crashed 3x on 2026-06-06 (crash
# reports 3908/3694553/3714436). NOT an HDR/color-mgmt bug — backtrace is purely
# in the layout/fullscreen path; cm_auto_hdr is off. Known unfixed upstream regression
# in 0.55.2 (latest stable): hyprwm/Hyprland discussion #14314 — bad_variant_access
# in CAlgorithm::recalculate on fixed-size/fullscreen windows.
# Setting this back to default (false) makes Hyprland reject the pinned-window
# fullscreen request *before* the buggy recalculate, restoring the safe no-op.
# To actually watch fullscreen: unpin first (or use SUPER+SHIFT+F fake-fullscreen,
# which keeps the window pinned and does not hit the crashing recalculate path).
# Re-enable once on a Hyprland build that fixes #14314.
binds {
    allow_pin_fullscreen = false
}
