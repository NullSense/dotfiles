# hyprlock — GPU-accelerated lockscreen. Works on sway via ext-session-lock-v1.
# Gruvbox dark palette: bg=#282828 fg=#ebdbb2 yellow=#fabd2f blue=#83a598 red=#cc241d

general {
    grace = 2
    hide_cursor = true
    no_fade_in = false
    disable_loading_bar = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 1.1
    brightness = 0.6
    vibrancy = 0.18
    vibrancy_darkness = 0.0
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(235, 219, 178, 1.0)
    font_size = 120
    font_family = Hack Nerd Font Mono Bold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 8
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(189, 174, 147, 1.0)
    font_size = 22
    font_family = Hack Nerd Font Mono
    position = 0, 80
    halign = center
    valign = center
}

# User greeter
label {
    monitor =
    text = Hi $USER
    color = rgba(250, 189, 47, 1.0)
    font_size = 18
    font_family = Hack Nerd Font Mono
    position = 0, -120
    halign = center
    valign = center
}

# Password input field
input-field {
    monitor =
    size = 320, 50
    outline_thickness = 3
    dots_size = 0.30
    dots_spacing = 0.30
    dots_center = true
    outer_color = rgba(131, 165, 152, 1.0)
    inner_color = rgba(40, 40, 40, 0.85)
    font_color = rgba(235, 219, 178, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgba(184, 187, 38, 1.0)
    fail_color = rgba(204, 36, 29, 1.0)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = rgba(254, 128, 25, 1.0)
    position = 0, -200
    halign = center
    valign = center
}
