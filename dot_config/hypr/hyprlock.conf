# hyprlock — GPU-accelerated lockscreen. Colors flip with omarchy-theme-set
# via the rendered ~/.config/omarchy/current/theme/hyprlock.conf, which
# defines $color (bg), $inner_color, $outer_color, $font_color, $check_color.
# Source-with-noerror so a fresh checkout (no theme rendered yet) doesn't
# block the lockscreen.

# hyprlang noerror true
source = ~/.config/omarchy/current/theme/hyprlock.conf
# hyprlang noerror false

general {
    grace = 2
    hide_cursor = true
    no_fade_in = false
    disable_loading_bar = true
    ignore_empty_input = true
}

background {
    monitor =
    # NVIDIA (RTX 5090): `path = screenshot` uses wlr-screencopy, which renders
    # BLACK on the nvidia-open KMS path — the lock widgets show but the backdrop
    # is black. Use the static themed wallpaper instead (omarchy's own default).
    # `color` is the fallback if the wallpaper symlink is ever missing.
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 1.1
    brightness = 0.6
    vibrancy = 0.18
    vibrancy_darkness = 0.0
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = $font_color
    font_size = 120
    font_family = Hack Nerd Font Mono Bold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 8
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = $font_color
    font_size = 22
    font_family = Hack Nerd Font Mono
    position = 0, 80
    halign = center
    valign = center
}

# User greeter — accent for the personal touch
label {
    monitor =
    text = Hi $USER
    color = $check_color
    font_size = 18
    font_family = Hack Nerd Font Mono
    position = 0, -120
    halign = center
    valign = center
}

# Password input field — colors come from the active theme
input-field {
    monitor =
    size = 320, 50
    outline_thickness = 3
    dots_size = 0.30
    dots_spacing = 0.30
    dots_center = true
    outer_color = $outer_color
    inner_color = $inner_color
    font_color = $font_color
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = $check_color
    fail_color = rgba(255, 80, 80, 1.0)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = $check_color
    position = 0, -200
    halign = center
    valign = center
}
