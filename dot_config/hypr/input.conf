# Input configuration — keyboard, mouse, touchpad.
# Mirrors the `input type:pointer / type:touchpad` blocks from sway.

input {
    kb_layout = us
    kb_options =

    # repeat: matches keyboard responsiveness
    repeat_rate = 40
    repeat_delay = 600

    # follow_mouse=0 ≡ sway `focus_follows_mouse no` (set in hyprland.conf)
    follow_mouse = 0

    # Mouse: flat acceleration, no enhanced precision (Logitech-friendly).
    accel_profile = flat
    sensitivity = 0.0
    scroll_method = 2fg
    natural_scroll = false

    touchpad {
        natural_scroll = true
        tap-to-click = true
        # 3-finger tap = middle click (sway tap_button_map lrm = 1f→L, 2f→R, 3f→M)
        tap_button_map = lrm
        disable_while_typing = true
        # Adaptive accel; 0.3 = sway's pointer_accel 0.3 mapped to Hyprland's [-1,1] roughly
        scroll_factor = 1.0
        clickfinger_behavior = true
        middle_button_emulation = false
    }
}

# Per-device override — touchpad orientation fix (matches sway calibration_matrix)
device {
    name = SYNA8005:00 06CB:CD8C Touchpad
    transform = 0
    # Hyprland uses `transform` (0/1/2/3) for rotation; the sway calibration
    # matrix `1 0 0 0 -1 1` was a vertical flip (Y-axis invert). If your
    # touchpad still scrolls inverted in this Hyprland session, toggle:
    #   natural_scroll = !natural_scroll  (in the touchpad block above), or
    #   set transform = 2  (here) for a 180° rotation of touch coords.
    # Test in session and tune; the calibration_matrix had no direct equivalent.
}

# Hyprland 0.54.x gestures — the old `gestures { workspace_swipe = ... }`
# block was replaced by a unified `gesture = ` directive.
# Format: gesture = FINGERS, DIRECTION, ACTION [, options]
#
# 3-finger horizontal swipe → switch workspaces (replaces sway bindgesture
# swipe:3:right/left workspace prev/next).
gesture = 3, horizontal, workspace

# 4-finger horizontal swipe → switch focus between windows (matches sway
# bindgesture swipe:4:right/left focus left/right).
gesture = 4, horizontal, move

# Tweak the legacy options that still live in the gestures block
gestures {
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_create_new = true
    workspace_swipe_forever = true
}
