# Look & Feel — animations, decoration, layout, color management.
# Eye-candy choices (per migration plan): subtle animations, inactive-only
# blur, drop shadows on floating; rounded corners OFF (per user preference).

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = $blue
    col.inactive_border = $bg2
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 0   # opted out of rounded corners

    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    # Inactive-window blur via windowrule (see windows.conf)
    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        ignore_opacity = false
        xray = false
        special = false
        popups = false
    }

    # Soft drop shadow on floating windows (tiled windows skip via rule)
    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(1a1a1aaa)
        color_inactive = rgba(00000077)
    }
}

# Launchers / pickers — disable open+close animation on these layers so the
# screen-freeze that follows (hyprpicker -r -z) doesn't capture the menu
# mid-fade. Same trick Omarchy uses on its walker layer.
# Hyprland 0.54.x layerrule syntax: `no_anim on, match:namespace NAME`
# (renamed from `noanim`, now requires explicit `on`, namespace via match:).
layerrule = no_anim on, match:namespace rofi
layerrule = no_anim on, match:namespace walker
layerrule = no_anim on, match:namespace vicinae

# whisrs dictation overlay — kill blur for crisp text + subtle visual.
layerrule = blur off,     match:namespace whisrs
layerrule = no_anim on,   match:namespace whisrs

animations {
    enabled = true

    # Curves — `smoothEase` is a quartic ease-out (close to Apple's "easeOutQuart")
    bezier = smoothEase, 0.25, 0.10, 0.25, 1.00
    bezier = overshot,   0.05, 0.90, 0.10, 1.05
    bezier = quick,      0.20, 0.40, 0.20, 1.00

    # Durations are in deciseconds (1 unit = 100ms). Trimmed ~40% from
    # original (4→2, 3→2, 5→3) for a snappier feel.
    animation = windows,        1, 2, smoothEase, popin 80%
    animation = windowsOut,     1, 2, smoothEase, popin 80%
    animation = workspaces,     1, 2, smoothEase, slide
    animation = specialWorkspace, 1, 2, smoothEase, slidefadevert -50%
    animation = layers,         1, 2, smoothEase, fade
    animation = fade,           1, 2, smoothEase
    animation = border,         1, 3, smoothEase
    animation = borderangle,    1, 3, smoothEase
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

# Native HDR — auto-toggles only when an HDR-tagged surface goes fullscreen.
# Companion `cm_fs_passthrough = 0` is required for cm_auto_hdr to fire.
# Apps that auto-trigger: mpv (target-colorspace-hint=yes already in mpv.conf),
# gamescope --hdr-enabled, HDR-aware browser playback. SDR content stays SDR.
#
# cm_auto_hdr values:
#   0 = off
#   1 = `cm = hdr` on fullscreen      (raw, may oversaturate)
#   2 = `cm = hdredid` on fullscreen  (uses monitor's EDID — recommended)
# We use 2 because the AORUS FO32U2 ships an accurate HDR1000 EDID block.
#
# direct_scanout = 1 lets fullscreen apps bypass the compositor for lower
# latency (zero-copy GPU path). Required for HDR auto-toggle to actually fire
# on this hardware (verified per hyprwm/Hyprland#11083).
#
# send_content_type = true lets the WM tell apps the display content type so
# games / video apps can pick the right surface format.
render {
    cm_auto_hdr        = 2
    cm_fs_passthrough  = 0
    direct_scanout     = 1
    send_content_type  = true
}

# Quirks — `prefer_hdr = 1` makes Hyprland advertise HDR support to clients
# even when the desktop is in SDR. Fixes auto-HDR firing reliably in mpv.
quirks {
    prefer_hdr = 1
}

# Fractional scaling polish — lets subpixel-aware apps render at native
# panel density via wp_fractional_scale_v1 (matching what we tuned in sway).
xwayland {
    force_zero_scaling = true
}

# Cursor
cursor {
    inactive_timeout = 3   # hide cursor after 3s of no movement (sway: hide_cursor 3000)
    no_warps = false
    persistent_warps = false
}
