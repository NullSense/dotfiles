# Monitor configuration — replaces ~/.config/kanshi/config.
# Uses Hyprland 0.55+ `monitorv2` block syntax (the modern form; legacy
# `monitor = NAME, ...` is deprecated as of 0.55 in favor of monitorv2 / Lua).
# Hyprland matches monitors by `output` — port name (DP-1, DP-2) is stable on
# this hardware; switch to `output = desc:...` if cables/ports get reshuffled.
#
# Block fields used here (full list: https://wiki.hypr.land/Configuring/Basics/Monitors/):
#   output     — port name or desc: prefix. MUST be the first field in the
#                block; Hyprland rejects out-of-order keys (home-manager #7230).
#   mode       — "WxH@Hz" or "preferred"
#   position   — "X x Y" virtual layout coords, or "auto"
#   scale      — float, or "auto"
#   bitdepth   — 8 or 10. 10 enables OLED gradient quality + 10-bit scanout.
#   transform  — 0=normal 1=90° 2=180° 3=270° (kept sway/kanshi semantics:
#                portrait long-edge-vertical = transform 1).
#   cm         — color management preset: srgb / wide / dcip3 / dp3 / adobe /
#                edid / hdr / hdredid / auto. `wide` = BT.2020 primaries; lets
#                wide-gamut Wayland surfaces (mpv, gamescope HDR, vkdt, etc.)
#                bypass sRGB clamping while sRGB content still renders sRGB.
#   sdr_eotf   — SDR transfer function: 0=default (follows render:cm_sdr_eotf),
#                1=sRGB piecewise, 2=gamma22. Match this to the monitor's OSD
#                gamma setting to avoid double-EOTF muting on 10-bit pipelines.
#
# The unmatched-output fallback below still uses legacy `monitor = , ...`
# because monitorv2 requires a concrete output key and has no wildcard form.

# AORUS FO32U2 (4K OLED, primary, scale 2.0× → logical 1920×1080)
# OSD: Custom picture mode, Native color space, Gamma 2.2.
#
# ── Color management history (2026-05-21 investigation) ──────────────────────
# After Hyprland 0.54.3 → 0.55.2 upgrade + reboot, SDR content appeared more
# muted/less saturated than on 0.54.3. Hyprland 0.55 introduced FP16-precision
# CM with default `cm_enabled=1`; on a wide-gamut OLED, content is now
# correctly sRGB-clamped on output, whereas 0.54.3's incomplete CM was sending
# sRGB values to wide-gamut hardware uncorrected (looked punchy but technically
# wrong). We explored these on this monitor:
#
#   `cm = srgb` (Hyprland default when omitted)
#     Colorimetrically correct sRGB. Subjectively muted vs pre-0.55 behavior
#     but accurate. The "after hdr-toggle off-cycle" state = effectively this.
#
#   `cm = wide` (BT.2020 primaries, what we briefly used)
#     Hyprland transforms sRGB → BT.2020 with perceptual gamut mapping and
#     signals BT.2020 to the monitor. In practice ~indistinguishable from srgb
#     for sRGB content (which is everything most apps emit) — it only helps
#     when wide-gamut surfaces actually arrive (mpv `target-colorspace-hint`,
#     gamescope `--hdr-enabled`, vkdt, color-managed image viewers).
#
#   `cm = auto`
#     Picks srgb at 8bpc, wide at 10bpc. Since bitdepth=10 here, behaves like
#     wide. Earlier live test was "even worse" — but live `hyprctl keyword
#     monitor` doesn't always re-negotiate output color space cleanly, so the
#     live result isn't representative of the config-load behavior.
#
#   `sdr_eotf = 2` (gamma 2.2, matching OSD)
#     Combined with `cm = wide`, this OVERBLEW whites on the FO32U2 — the wide
#     gamut + gamma 2.2 EOTF + default 80-nit SDR luminance ceiling caused the
#     monitor to unlock brighter peaks than SDR content was authored for.
#     Removed. Default (0 = follow render:cm_sdr_eotf, which is sRGB piecewise)
#     looks correct.
#
#   `cm_enabled = 0` (global, not per-monitor)
#     Tried as a "go back to 0.54 behavior" knob. Caused a gray-haze "lifted
#     blacks" look due to EOTF mismatch on the 10-bit pipeline (Hyprland skips
#     the EOTF transform but the panel still expects gamma-encoded input).
#     Don't disable globally with bitdepth=10.
#
# Current state below = no `cm` or `sdr_eotf`, so Hyprland uses defaults:
# cm=srgb preset + sdr_eotf=follow render:cm_sdr_eotf (sRGB piecewise). This
# matches the "hdr-toggle off-cycle" state that user found least washed-out.
# To revert to forcing wide gamut, add `cm = wide` back. To go full HDR for
# everything, see ~/bin/hdr-toggle (cm = hdr / BT.2100 PQ).
#
# 2026-05-28 final: monitor OSD set to Native, bitdepth = 10, cm = dp3.
# `auto` would resolve to BT.2020/wide at 10bpc, which exceeds this 99% P3
# panel and looked washed out. `dcip3` uses the cinema P3 white point and can
# push whites green. `dp3` is the Display-P3/D65-ish preset that best matches
# the FO32U2 native desktop mode.
#
# HDR OSD picture mode (for film accuracy): use the plain "HDR" preset, NOT
# "HDR 1000"/Peak 1000. The FO32U2 is VESA DisplayHDR *True Black 400* certified
# and the base "HDR" mode IS that TB400 behavior — it tracks the PQ/EOTF curve
# accurately across the whole range. "HDR 1000" (added via firmware) only boosts
# tiny <5% highlights to ~1000 nits but crushes mid-tones darker than intended
# (poor PQ tracking >10% APL). There is no separate "True Black 400" menu item;
# "HDR" = TB400. Avoid "HDR Vivid" (oversaturated). mpv tone-maps to whatever
# peak the panel reports, so the accurate TB400 target gives the correct image.
# ─────────────────────────────────────────────────────────────────────────────
monitorv2 {
    output = DP-1
    mode = 3840x2160@240
    position = 0x0
    scale = 2.0
    bitdepth = 10
    cm = dp3
    supports_hdr = 1
}

# MSI MAG274QRF-QD (1440p QD-IPS, ~95% DCI-P3, portrait via transform 1 = 90°).
# OSD/native mode follows a P3-like QD panel. Keep this at `dp3` rather than
# `auto`: at 8bpc auto would fall back to sRGB, while `dp3` matches the current
# live desktop choice without enabling HDR.
monitorv2 {
    output = DP-2
    mode = 2560x1440@165
    position = 1920x0
    scale = 1.0
    transform = 1
    bitdepth = 8
    cm = dp3
    supports_hdr = 0
}

# Laptop panel (eDP-1) — when undocked, used standalone
#monitorv2 {
    #output = eDP-1
    #mode = preferred
    #position = auto
    #scale = 1.5
#}

# Fallback for any unrecognized output. Stays legacy because monitorv2 has no
# wildcard `output` form — needs a concrete name. Mirrors kanshi's fallback-single.
monitor = , preferred, auto, 1.0

# --- Per-monitor workspace assignments (replaces sway `workspace $wsN output`)
# Aliases (from sway): $primary = DP-1 (AORUS), $vertical = DP-2 (MSI portrait)
# Hyprland uses output description matching; we use port name for brevity since
# DP-1/DP-2 is stable on this desktop config.
workspace = 1,  monitor:DP-1, default:true
workspace = 2,  monitor:DP-1
workspace = 3,  monitor:DP-2
workspace = 4,  monitor:DP-1
workspace = 5,  monitor:DP-1
workspace = 6,  monitor:DP-1
workspace = 7,  monitor:DP-1
workspace = 8,  monitor:DP-1
workspace = 9,  monitor:DP-1
workspace = 10, monitor:DP-1

# Special workspaces (scratchpad equivalents — sway used `move scratchpad`).
# Sizes/positions for the dropdown live in windows.conf's windowrule chain
# (matched on class com.mitchellh.ghostty-dropdown). Spawning is done by
# dropdown-terminal.service so the workspace stays warm across kills.
# `on-created-empty` is gone — it only fires once on first creation, not
# on every respawn, which broke the Restart=always invariant.
workspace = special:dropdown
workspace = special:spotify,  on-created-empty:[float; size 1500 950; move 50%-750 50%-475] spotify-launcher
