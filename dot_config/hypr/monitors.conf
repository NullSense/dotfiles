# Monitor configuration — replaces ~/.config/kanshi/config.
# Hyprland matches monitors by `desc:` (description string from EDID) which is
# stable across DP cable swaps, vs kanshi's make/model/serial — same idea,
# native syntax. Run `hyprctl monitors` to see desc strings live.
#
# Format: monitor = NAME, RESOLUTION, POSITION, SCALE [, EXTRA-OPTS...]
#   bitdepth, 10        — 10-bit color (OLED gradient quality)
#   transform, N        — 0=normal 1=90° 2=180° 3=270° (note: was 270 in sway, but layout-wise we want long edge vertical = transform 1 (90°) for portrait usage from the user's perspective; keeping kanshi's `transform 90` semantics → transform 1)
#   vrr, 0/1            — variable refresh rate
#   cm, srgb/wide/hdr/hdredid/auto — color management; wide enables BT.2020 primaries
#   sdrbrightness, X    — SDR content brightness when in HDR mode (1.0 = neutral)
#
# At scale 2.0× the AORUS is integer/pixel-perfect.

# Hyprland's parser splits `monitor =` lines on commas, so a `desc:` string
# with embedded commas (e.g. "GIGA-BYTE TECHNOLOGY CO., LTD.") breaks parsing.
# We use port names (DP-1, DP-2) — stable on this hardware. If you swap
# cables and ports change, update these or switch to a comma-free desc match.

# AORUS FO32U2 (4K OLED, primary, scale 2.0× → logical 1920×1080)
monitor = DP-1, 3840x2160@240, 0x0, 2.0, bitdepth, 10

# MSI MAG274QRF-QD (1440p IPS, portrait via transform 1 = 90°, scale 1.0)
monitor = DP-2, 2560x1440@165, 1920x0, 1.0, transform, 1

# Laptop panel (eDP-1) — when undocked, used standalone
monitor = eDP-1, preferred, auto, 1.5

# Fallback for any unrecognized output (mirrors kanshi's fallback-single)
monitor = , preferred, auto, 1.0

# --- Per-monitor workspace assignments (replaces sway `workspace $wsN output`)
# Aliases (from sway): $primary = DP-1 (AORUS), $vertical = DP-2 (MSI portrait)
# Hyprland uses output description matching; we use port name for brevity since
# DP-1/DP-2 is stable on this desktop config.
workspace = 1,  monitor:DP-1, default:true
workspace = 2,  monitor:DP-1
workspace = 3,  monitor:DP-2
workspace = 4,  monitor:DP-1
workspace = 5,  monitor:DP-1
workspace = 6,  monitor:DP-1
workspace = 7,  monitor:DP-1
workspace = 8,  monitor:DP-1
workspace = 9,  monitor:DP-1
workspace = 10, monitor:DP-1

# Special workspaces (scratchpad equivalents — sway used `move scratchpad`).
# We declare named special workspaces for the dropdown terminal and Spotify.
# Sizes are in logical pixels. DP-1 is 4K @ 2.0× scale → logical 1920×1080,
# so dropdowns must fit inside that — earlier 2000×1300 overflowed by 80×220.
workspace = special:dropdown, on-created-empty:[float; size 1400 900; move 50%-700 50%-450] ghostty --class=dropdown_term
workspace = special:spotify,  on-created-empty:[float; size 1500 950; move 50%-750 50%-475] spotify-launcher
