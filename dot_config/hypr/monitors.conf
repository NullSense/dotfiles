# ============================================================================
# TEMPORARY NVIDIA-safe baseline — written by boot-into-hyprland-fix.sh.
# Goal: guarantee a visible Hyprland session on the RTX 5090.
# No monitorv2, no HDR/10-bit/color-management, no `highres` — those are the
# NVIDIA-fragile options that were black-screening the session. Once you can log
# in, re-add them one at a time (your fully-commented original is in the backup
# dir printed by the script).
#
# Geometry preserved from the original:
#   AORUS FO32U2 (4K)  = primary, top-left,  scale 2.0
#   MSI MAG274QRF-QD   = right of it, portrait (transform 1 = 90deg), scale 1.0
# `preferred` lets each panel pick its own native mode (safest for cold DP link
# training on NVIDIA). Bump refresh later, e.g. `..., 3840x2160@240, ...`.
# ============================================================================

monitor = desc:AORUS FO32U2,    preferred, 0x0,    2.0
monitor = desc:MAG274QRF-QD,    preferred, 1920x0, 1.0, transform, 1

# Catch-all: if desc: matching ever misses, this still lights any output so you
# are never left at a black screen.
monitor = , preferred, auto, 1.0

# --- Per-monitor workspaces (kept from the original, desc:-matched) ----------
workspace = 1,  monitor:desc:AORUS FO32U2, default:true
workspace = 2,  monitor:desc:AORUS FO32U2
workspace = 3,  monitor:desc:MAG274QRF-QD
workspace = 4,  monitor:desc:AORUS FO32U2
workspace = 5,  monitor:desc:AORUS FO32U2
workspace = 6,  monitor:desc:AORUS FO32U2
workspace = 7,  monitor:desc:AORUS FO32U2
workspace = 8,  monitor:desc:AORUS FO32U2
workspace = 9,  monitor:desc:AORUS FO32U2
workspace = 10, monitor:desc:AORUS FO32U2

workspace = special:dropdown
workspace = special:spotify,  on-created-empty:[float; size 1500 950] spotify-launcher
