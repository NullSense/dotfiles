# ============================================================================
# CANONICAL NVIDIA reset — 2026-06-26 (Phase-2 black-screen fix).
# Uses monitorv2 (the syntax that ACTUALLY honors bitdepth — legacy `monitor=`
# silently ignored it, so Aquamarine kept allocating 10-bit XB30, whose atomic
# KMS commit the NVIDIA 610 driver rejects → outputs disabled in a loop → black).
# Forced 8-bit (XB24), NO color-management, NO HDR, NO highres, NO scanout.
# Re-add 10-bit/HDR/dualmode/cm ONE knob at a time AFTER a session comes up.
# ============================================================================

monitorv2 {
    output = DP-1
    mode = 3840x2160@240
    position = 0x0
    scale = 2.0
    bitdepth = 10
}

monitorv2 {
    output = DP-2
    mode = 2560x1440@120
    position = 1920x0
    scale = 1.0
    bitdepth = 8
    transform = 1
}

# --- Per-monitor workspaces (desc:-matched) ---------------------------------
workspace = 1,  monitor:DP-1, default:true
workspace = 2,  monitor:DP-1
workspace = 3,  monitor:DP-2
workspace = 4,  monitor:DP-1
workspace = 5,  monitor:DP-1
workspace = 6,  monitor:DP-1
workspace = 7,  monitor:DP-1
workspace = 8,  monitor:DP-1
workspace = 9,  monitor:DP-1
workspace = 10, monitor:DP-1

workspace = special:dropdown
workspace = special:spotify,  on-created-empty:[float; size 1500 950] spotify-launcher
