# Window rules — translates sway `for_window` to Hyprland 0.54 syntax.
#
# Hyprland 0.54.x window rule syntax (current, post-deprecation):
#   windowrule = ACTION [VALUE], match:KEY VALUE [, match:KEY2 VALUE2 ...]
#
# Notes vs older docs:
#   - Drop regex anchors: `class:^(foo)$` → `match:class foo`
#   - On/off rules need explicit `on`: `float` → `float on`
#   - Match conditions go in `match:KEY VALUE` form (space, no colon)
#
# `inhibit_idle fullscreen` from sway is handled by hypridle's
# `inhibit_sources = audio` instead.

# --- Special workspaces / dropdown -------------------------------------------
# Ghostty dropdown — toggled by $mod+u. Class must be a valid GTK app ID
# (reverse-DNS) or Ghostty silently drops `--class` and the window keeps
# the default `com.mitchellh.ghostty`, which makes the rule below miss and
# the dropdown ends up in tiling. We use `com.mitchellh.ghostty-dropdown`
# (keeps the upstream prefix so DBus/.desktop activation still works).
# `silent` is required on the workspace rule — without it `togglespecial`
# focus-glitches when systemd's Restart=always races a respawn.
windowrule = workspace special:dropdown silent, match:class com.mitchellh.ghostty-dropdown
windowrule = float on,                          match:class com.mitchellh.ghostty-dropdown
windowrule = size 1400 900,                     match:class com.mitchellh.ghostty-dropdown
windowrule = center 1,                          match:class com.mitchellh.ghostty-dropdown

# Spotify scratchpad — workspace declared in monitors.conf (with launcher)
windowrule = workspace special:spotify silent, match:class Spotify

# --- Idle inhibit ------------------------------------------------------------
# Native windowrule-based idleinhibit was rejected by your Hyprland version
# ("invalid field type idleinhibit"), so we rely on hypridle's
# `inhibit_sources = audio` (already set in hypridle.conf) — anything emitting
# audio (mpv, browsers, games) keeps the session awake. Window-class targeting
# would require a Hyprland version with the v1.0+ rule schema.

# --- Floating + sticky for media-style apps ----------------------------------
windowrule = float on, match:class mpv
windowrule = pin on,   match:class mpv          # `pin on` = sway's `sticky enable`
windowrule = float on, match:class imv
# Satty's actual class is com.gabm.satty (verified via hyprctl clients).
# `match:class satty` would silently fail to match.
windowrule = float on,        match:class com.gabm.satty
windowrule = size 1400 900,   match:class com.gabm.satty
windowrule = center 1,        match:class com.gabm.satty

# --- Pickers (clipboard/screenshot) — large floating ------------------------
windowrule = float on,        match:class clipboard-picker
windowrule = size 50% 40%,    match:class clipboard-picker
windowrule = center 1,        match:class clipboard-picker

windowrule = float on,        match:class screenshot-picker
windowrule = size 40% 25%,    match:class screenshot-picker
windowrule = center 1,        match:class screenshot-picker

windowrule = float on,        match:class floating-monitor
windowrule = size 60% 60%,    match:class floating-monitor
windowrule = center 1,        match:class floating-monitor

# --- Problematic / utility apps ----------------------------------------------
windowrule = float on,        match:class electrum
windowrule = size 1280 720,   match:class electrum

windowrule = float on,        match:class pavucontrol
windowrule = size 1280 720,   match:class pavucontrol

windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class gnome-calculator
windowrule = float on, match:class org.gnome.Calculator
windowrule = float on, match:class io.gpu-screen-recorder.GPUScreenRecorder
windowrule = float on, match:class org.gnome.FileRoller
windowrule = float on, match:class org.kde.ark
windowrule = float on, match:class thunar
windowrule = float on, match:class file-roller
windowrule = float on, match:class xdg-desktop-portal-gtk
windowrule = float on, match:class wlogout
# Picture-in-Picture popups float, pinned, top-right
windowrule = float on,                     match:title Picture-in-Picture
windowrule = pin on,                       match:title Picture-in-Picture
windowrule = size 480 270,                 match:title Picture-in-Picture
windowrule = move 100%-500 100%-290,       match:title Picture-in-Picture

windowrule = float on, match:title Polkit
windowrule = float on, match:title File Operation Progress
windowrule = float on, match:title Sharing Indicator
windowrule = pin on,   match:title Sharing Indicator

# --- Chat apps → workspace 3 (vertical MSI) ----------------------------------
windowrule = workspace 3 silent, match:class Signal
windowrule = workspace 3 silent, match:class signal
windowrule = workspace 3 silent, match:class discord
windowrule = workspace 3 silent, match:class TelegramDesktop
windowrule = workspace 3 silent, match:class org.telegram.desktop

# --- Center + size for browser dialogs ---------------------------------------
windowrule = center 1,        match:class Navigator
windowrule = size 1080 720,   match:class Navigator

# --- Decoration tweaks ------------------------------------------------------
# noshadow / noblur as windowrule actions were renamed/removed in 0.54.x.
# Decoration scope is now controlled at the global level (see looknfeel.conf
# `decoration { blur { ... } shadow { ... } }`). Inactive-only blur is
# achieved by setting `inactive_opacity` differently or via layer rules.
# We accept blur/shadow on all windows for now — it's subtle anyway.
