# litellm gateway — the ONE OpenAI endpoint every app/session talks to.
# Maps LOGICAL model names → physical backends. This file is the only place that knows
# about ports, providers, GPU/CPU, and (via env) keys. Apps know only the logical names.
# See ~/notes/LLM-STACK.md and ~/Programming/llm-stack/docs/litellm-cleanup-plan.md.
#
# Run (dev):  litellm --config ~/.config/litellm/config.yaml --port 4000
# Install:    uv tool install 'litellm[proxy]'   (or pipx install 'litellm[proxy]')
# Test:       curl http://localhost:4000/v1/models -H "Authorization: Bearer $LLM_API_KEY"
#
# Apps set:   OPENAI_BASE_URL/LLM_GATEWAY_URL=http://localhost:4000 , LLM_API_KEY=<virtual key>
#
# ── THE SWITCH (local ⇄ cloud), one knob ───────────────────────────────────────────
# `summarize-cheap`, `summarize-strong`, `oracle-llm` each have TWO deployments under the
# same logical name, distinguished by `model_info.supported_environments`:
#   • development → LOCAL (llama-swap :9292, free, eats VRAM)
#   • production  → CLOUD (OpenRouter DeepSeek, frees VRAM, costs money)
# The proxy loads only the deployment whose environment matches $LITELLM_ENVIRONMENT.
# `stack` sets LITELLM_ENVIRONMENT=development by default → LOCAL. Flip the whole gateway
# to cloud with:   LITELLM_ENVIRONMENT=production stack restart
# Deployments WITHOUT a supported_environments key (embed, gemma-e4b/12b, lfm2-*, code-big,
# rewrite-fast) are available in BOTH environments.
#
# ── METADATA (model_info) ──────────────────────────────────────────────────────────
# Every deployment carries rich model_info so the Model Hub + /v1/model/info show real
# numbers: mode, input/output cost-per-token (0 for local), context limits, and a nested
# `metadata` block (backend, vram, quant, tok/s, quality from OUR faithfulness bench, tags).
# Costs are USD per TOKEN (OpenRouter $/1M ÷ 1e6). Quality = overall/5 on the oracle v5
# summariser set, judged by a consistent Claude rubric (see docs/leaderboard.md); tok/s are
# measured on the RX 6750 XT (gfx1031, llama.cpp Vulkan) and approximate (≈).

model_list:
  # ── embeddings (sift, oracle) — local always ──────────────────────────────────
- model_name: embed
  litellm_params:
    model: openai/embed                    # embeddings dialect — keep openai/ (llamafile provider is chat-only)
    api_base: http://127.0.0.1:9292/v1     # llama-swap → Octen-Embedding-4B (shared GPU)
    api_key: "none"
    input_cost_per_token: 0
    output_cost_per_token: 0
  model_info:
    mode: embedding
    input_cost_per_token: 0
    output_cost_per_token: 0
    max_input_tokens: 8192
    metadata:
      display_name: "Embed · Octen-Embedding-4B (local)"
      backend: "llama.cpp Vulkan (RX 6750 XT) · Octen-Embedding-4B (Qwen3-Embedding-4B finetune), 2560-dim"
      vram: "~4.4 GB"
      quant: "Q?_K_M"
      role: "shared embedder for sift + oracle"
      tags: ["embedding", "local", "shared", "qwen3-embedding"]
      source_url: https://huggingface.co/Qwen/Qwen3-Embedding-4B

