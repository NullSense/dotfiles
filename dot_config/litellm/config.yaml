# litellm gateway — the ONE OpenAI endpoint every app/session talks to.
# Maps LOGICAL model names → physical backends. This file is the only place that knows
# about ports, providers, GPU/CPU, and (via env) keys. Apps know only the logical names.
# See ~/notes/LLM-STACK.md and ~/Programming/llm-stack/docs/litellm-cleanup-plan.md.
#
# Run (dev):  litellm --config ~/.config/litellm/config.yaml --port 4000
# Install:    uv tool install 'litellm[proxy]'   (or pipx install 'litellm[proxy]')
# Test:       curl http://localhost:4000/v1/models -H "Authorization: Bearer $LLM_API_KEY"
#
# Apps set:   OPENAI_BASE_URL/LLM_GATEWAY_URL=http://localhost:4000 , LLM_API_KEY=<virtual key>
#
# ── THE SWITCH (local ⇄ cloud), one knob ───────────────────────────────────────────
# `summarize-cheap`, `summarize-strong`, `oracle-llm` are INTENT ROUTES (see docs/CAPABILITIES.md):
# each has TWO deployments under the same logical name, distinguished by `model_info.supported_environments`:
#   • development → LOCAL (llama-swap :9292, free, eats VRAM)
#   • production  → CLOUD (OpenRouter DeepSeek, frees VRAM, costs money)
# The proxy loads only the deployment whose environment matches $LITELLM_ENVIRONMENT.
# `stack` sets LITELLM_ENVIRONMENT=development by default → LOCAL. Flip the whole gateway
# to cloud with:   LITELLM_ENVIRONMENT=production stack restart
# Deployments WITHOUT a supported_environments key (embed, HF-identity single-backend models,
# rewrite-fast) are available in BOTH environments.
#
# ── METADATA (model_info) ──────────────────────────────────────────────────────────
# Every deployment carries rich model_info so the Model Hub + /v1/model/info show real
# numbers: mode, input/output cost-per-token (0 for local), context limits, and a nested
# `metadata` block (backend, vram, quant, tok/s, quality from OUR faithfulness bench, tags).
# Costs are USD per TOKEN (OpenRouter $/1M ÷ 1e6). Quality = overall/5 on the oracle v5
# summariser set, judged by a consistent Claude rubric (see docs/leaderboard.md); tok/s are
# measured on the retired RX 6750 XT (Vulkan); now RTX 5090/CUDA so real tok/s is HIGHER — treat these as stale lower bounds (≈).

# ── PROFILES (2026-07-22 split) ────────────────────────────────────────────────────
# THIS file is the ALWAYS-ON gateway (:4000): model routing only — NO mcp_servers, NO
# tool discovery — so it binds in seconds (MCP discovery was adding 40s-4min before
# uvicorn could bind, and stalls with unreachable remote MCPs). MCP aggregation lives
# in config-mcp.yaml (:4001, `stack mcp`). Model routes are DRY via include: below.
# ⚠ store_model_in_db: litellm re-applies DB-stored litellm_settings ~3min post-boot,
# OVERRIDING this file — after changing settings here, check the LiteLLM_Config table
# (see memory: litellm-db-config-override). mcp_servers + mcp_semantic_tool_filter
# were purged from the DB 2026-07-22 for exactly that reason.

include:
  - models.yaml

litellm_settings:
  # Task prompts (dotprompt): summarize/rewrite/extract → config/prompts/<id>.prompt.
  # Global dir form (NOT per-prompt prompt_directory, which crashes boot). Reference via prompt_id.
  global_prompt_directory: "/home/nullsense/Programming/llm-stack/config/prompts"
  callbacks: ["otel"]           # emit OTLP traces of every LLM call → the OTEL_ENDPOINT
                                # collector (local: otel-lgtm :4318 / langfuse via fan-out).
                                # Env set by `stack`: LITELLM_OTEL_V2/OTEL_EXPORTER/OTEL_ENDPOINT.
  num_retries: 2
  request_timeout: 600          # local models + cold-swap loads can be slow
  drop_params: true             # tolerate clients sending params a backend doesn't support
  # Failure-fallback at the gateway (oracle also gates in-app): a failed/unreachable
  # summarize-cheap (local Gemma E4B in dev) fails over FIRST to DeepSeek-v4-flash
  # cloud (env-independent), then to summarize-strong as a last resort.
  fallbacks: ["summarize-cheap": ["summarize-fallback", "summarize-strong"]]

  # ── EXACT response cache (safe: byte-identical request → identical answer). NOT
  #    semantic — semantic carries a 3-8% wrong-answer false-hit rate, unacceptable for
  #    unique-article summaries. disk backend = zero new service. mode default_off =
  #    opt-in: a request caches only when it sends `cache: {"no-cache": false}`. ──────
  cache: true
  cache_params:
    type: disk
    disk_cache_dir: "/home/nullsense/.cache/llm-stack/litellm-cache"  # FIXED path — default is CWD-relative (./.litellm_cache), which leaks into whatever dir launched the proxy
    mode: default_off

  # ── Model Hub (/ui/model_hub_table) — advertise HF-identity names publicly ──────
  #    Intent routes (summarize-cheap/strong, oracle-llm) kept for backwards compat.
  #    Bench-only quant variants (e4b-q4/q8) intentionally omitted.
  public_model_groups: ["embed", "summarize-cheap", "summarize-strong", "oracle-llm", "google/gemma-4-E4B-it", "yuxinlu1/gemma-4-12B-it-Claude-4.6-4.8-Opus-GGUF", "LiquidAI/LFM2-1.2B-Extract", "LiquidAI/LFM2-2.6B", "LuffyTheFox/Qwen3.6-35B-A3B-Uncensored", "ibm-granite/granite-vision-3.3-2b", "datalab-to/chandra-ocr-2", "anthropic/claude-3.5-sonnet", "rewrite-fast", "sift-decompose", "sift-agent", "yuxinlu1/gemma-4-12B-it-Claude-4.6-4.8-Opus-GGUF:think", "yuxinlu1/gemma-4-12B-it-Claude-4.6-4.8-Opus-GGUF:fast", "google/gemma-4-E4B-it:think", "google/gemma-4-E4B-it:fast", "LuffyTheFox/Qwen3.6-35B-A3B-Uncensored:think", "LuffyTheFox/Qwen3.6-35B-A3B-Uncensored:fast"]

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"   # in Infisical /litellm; mint per-app virtual keys from it
  database_url: "os.environ/DATABASE_URL"       # litellm-db (:5433) — /key/generate + spend tracking
  store_model_in_db: true                       # persist model groups → Model Hub can list them
