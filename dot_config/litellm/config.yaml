# litellm gateway — the ONE OpenAI endpoint every app/session talks to.
# Maps LOGICAL model names → physical backends. This file is the only place that knows
# about ports, providers, GPU/CPU, and (via env) keys. Apps know only the logical names.
# See ~/notes/LLM-STACK.md and ~/Programming/llm-stack/docs/litellm-cleanup-plan.md.
#
# Run (dev):  litellm --config ~/.config/litellm/config.yaml --port 4000
# Install:    uv tool install 'litellm[proxy]'   (or pipx install 'litellm[proxy]')
# Test:       curl http://localhost:4000/v1/models -H "Authorization: Bearer $LLM_API_KEY"
#
# Apps set:   OPENAI_BASE_URL/LLM_GATEWAY_URL=http://localhost:4000 , LLM_API_KEY=<virtual key>
#
# ── THE SWITCH (local ⇄ cloud), one knob ───────────────────────────────────────────
# `summarize-cheap`, `summarize-strong`, `oracle-llm` are INTENT ROUTES (see docs/CAPABILITIES.md):
# each has TWO deployments under the same logical name, distinguished by `model_info.supported_environments`:
#   • development → LOCAL (llama-swap :9292, free, eats VRAM)
#   • production  → CLOUD (OpenRouter DeepSeek, frees VRAM, costs money)
# The proxy loads only the deployment whose environment matches $LITELLM_ENVIRONMENT.
# `stack` sets LITELLM_ENVIRONMENT=development by default → LOCAL. Flip the whole gateway
# to cloud with:   LITELLM_ENVIRONMENT=production stack restart
# Deployments WITHOUT a supported_environments key (embed, HF-identity single-backend models,
# rewrite-fast) are available in BOTH environments.
#
# ── METADATA (model_info) ──────────────────────────────────────────────────────────
# Every deployment carries rich model_info so the Model Hub + /v1/model/info show real
# numbers: mode, input/output cost-per-token (0 for local), context limits, and a nested
# `metadata` block (backend, vram, quant, tok/s, quality from OUR faithfulness bench, tags).
# Costs are USD per TOKEN (OpenRouter $/1M ÷ 1e6). Quality = overall/5 on the oracle v5
# summariser set, judged by a consistent Claude rubric (see docs/leaderboard.md); tok/s are
# measured on the retired RX 6750 XT (Vulkan); now RTX 5090/CUDA so real tok/s is HIGHER — treat these as stale lower bounds (≈).

model_list:
  # ── embeddings (sift, oracle) — local always ──────────────────────────────────
- model_name: embed-lfm
  litellm_params:
    model: openai/embed-lfm                 # → llama-swap alias embed-lfm (LFM2.5-Embedding-350M, CPU)
    api_base: http://127.0.0.1:9292/v1
    api_key: "none"
    input_cost_per_token: 0
    output_cost_per_token: 0
    tags: ["embedding", "local", "lfm2", "multilingual"]
  model_info:
    mode: embedding
    max_input_tokens: 512
    metadata:
      display_name: "Embed-LFM · LFM2.5-Embedding-350M (CPU, 1024-dim)"
      backend: "llama.cpp CUDA (RTX 5090) · LFM2.5-Embedding-350M-GGUF Q8_0, ~0.4 GB VRAM"
      role: "MCP tool semantic filter + fast multilingual embed (alias: tool-embed)"
      source_url: https://huggingface.co/LiquidAI/LFM2.5-Embedding-350M
- model_name: embed
  litellm_params:
    model: openai/embed                    # embeddings dialect — keep openai/ (llamafile provider is chat-only)
    api_base: http://127.0.0.1:9292/v1     # llama-swap → Octen-Embedding-4B (shared GPU)
    api_key: "none"
    input_cost_per_token: 0
    output_cost_per_token: 0
    tags:
    - "embedding"
    - "local"
    - "shared"
    - "qwen3-embedding"
  model_info:
    mode: embedding
    input_cost_per_token: 0
    output_cost_per_token: 0
    max_input_tokens: 8192
    metadata:
      display_name: "Embed · Octen-Embedding-4B (local)"
      backend: "llama.cpp CUDA (RTX 5090) · Octen-Embedding-4B (Qwen3-Embedding-4B finetune), 2560-dim"
      vram: "~4.4 GB"
      quant: "Q?_K_M"
      role: "shared embedder for sift + oracle"
      tags: ["embedding", "local", "shared", "qwen3-embedding"]
      source_url: https://huggingface.co/Qwen/Qwen3-Embedding-4B

  # ── INTENT ROUTES: summarize-cheap / summarize-strong / oracle-llm ─────────────
  # These are load-bearing contract names for oracle (apps/ingest/summarize.py) + sift.
  # DO NOT rename or merge their dual deployments — prod is DeepSeek, not the local model.
  # See docs/CAPABILITIES.md for the intent-routing taxonomy.

  # ── summarize-cheap: bulk summaries (oracle cheap-first) ───────────────────────
- model_name: summarize-cheap
  litellm_params:                      # DEV → VRAM-adaptive llama-swap (:9292 'summarize'): diffusiongemma-26B when GPU free, else E4B, else this route errors → fallback chain (→ cloud)
    model: openai/summarize
    api_base: http://127.0.0.1:9292/v1
    api_key: "EMPTY"
    input_cost_per_token: 0
    output_cost_per_token: 0
    tags:
    - "summarization"
    - "local"
    - "gemma"
    - "faithful"
    - "cheap"
  model_info:
    supported_environments: ["development"]
    mode: chat
    supports_function_calling: true
    input_cost_per_token: 0
    output_cost_per_token: 0
    max_input_tokens: 131072
    max_output_tokens: 8192
    metadata:
      display_name: "Summarize-cheap · VRAM-adaptive (diffusiongemma ⟂ E4B, llama-swap dev)"
      backend: "llama-swap :9292 'summarize' — live free-VRAM check at load picks diffusiongemma-26B (vLLM NVFP4, ~22GB) when GPU free, else gemma-4-E4B (llama.cpp Q4, ~6GB, game-friendly); short ttl re-checks each load"
      quant: "diffusiongemma NVFP4 (Blackwell FP4) / E4B QAT Q4"
      vram: "~22 GB (diffusion) or ~6 GB (E4B) — chosen by live free VRAM at load"
      tokens_per_second: "diffusion ≈650 single / E4B ≈202 (benchmarked, same-judge)"
      quality_overall: 4.38
      faithfulness: 4.75
      fabrication_pct: 0
      tags: ["summarization", "local", "adaptive", "diffusion", "gemma", "faithful", "cheap"]
      source_url: https://huggingface.co/google/diffusiongemma-26B-A4B-it
- model_name: summarize-cheap
  litellm_params:                      # PROD → cloud DeepSeek-v4-flash (frees VRAM)
    model: openrouter/deepseek/deepseek-v4-flash
    api_key: "os.environ/OPENROUTER_API_KEY"
    input_cost_per_token: 9e-08
    output_cost_per_token: 1.8e-07
    tags:
    - "summarization"
    - "cloud"
    - "deepseek"
    - "cheap"
  model_info:
    supported_environments: ["production"]
    mode: chat
    supports_function_calling: true
    input_cost_per_token: 0.00000009     # $0.09 / 1M in
    output_cost_per_token: 0.00000018    # $0.18 / 1M out
    max_input_tokens: 131072
    max_output_tokens: 8192
    metadata:
      display_name: "Summarize-cheap · DeepSeek-v4-flash (cloud, prod)"
      backend: "OpenRouter · deepseek/deepseek-v4-flash"
      vram: "0 (hosted)"
      quality_overall: 4.43
      tags: ["summarization", "cloud", "deepseek", "cheap"]
      source_url: https://openrouter.ai/deepseek/deepseek-v4-flash

  # ── summarize-fallback: env-independent DeepSeek-v4-flash (gateway failure fallback) ──
  #    No supported_environments key → loaded in BOTH dev and prod, so a failed
