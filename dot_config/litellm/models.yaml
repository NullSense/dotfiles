      role: "legalkb embedder; future sift legalkb-tenant embedding (2048-dim ⇒ separate sift vector-config, never interchangeable with 2560-dim `embed`)"
      source_url: https://huggingface.co/codefuse-ai/F2LLM-v2-1.7B
# ── NVIDIA Nemotron retrieval pair (2026-07-22) — sift embed+rerank candidates, vLLM v0.25 ──
- model_name: embed-nemotron
  litellm_params:
    model: openai/nemotron-embed-1b         # → llama-swap nemotron-embed-1b (vLLM /v1/embeddings)
    api_base: http://127.0.0.1:9292/v1
