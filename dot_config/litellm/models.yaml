  # ── summarize-pro: PREMIUM on-demand tier — diffusiongemma, opened via `stack pro` ──
  #    Discrete text-DIFFUSION LM (nvidia/diffusiongemma-26B-A4B-it-NVFP4, MoE 3.8B-active).
  #    Serves on :8002 ONLY while the premium window is open (`stack pro on`), which EVICTS
  #    the always-on E4B (:8001) — they can't coexist (~19GB + ~15GB > 32GB). `stack pro off`
  #    restores E4B. Returns a connection error when the window is closed — deliberate: this is
  #    an explicit, human-opened tier, not an auto-swap (evicting the summariser+dictation slot
  #    per request would be too disruptive). Apps still just hit the gateway with `summarize-pro`.
