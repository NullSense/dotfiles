    input_cost_per_token: 0
    output_cost_per_token: 0
    tags: ["embedding", "local", "nvidia", "nvfp4"]
  model_info:
    engine: "vllm"
    hf_repo: "nvidia/Nemotron-3-Embed-1B-NVFP4"
    mode: embedding
    max_input_tokens: 4096
    metadata:
      display_name: "Embed · Nemotron-3-Embed-1B NVFP4 (vLLM, 2048-dim)"
      backend: "vLLM v0.25.0 CUDA (RTX 5090, NVFP4-native on Blackwell) via llama-swap"
      role: "sift embed candidate. ⚠ /v1/embeddings needs 'query: '/'passage: ' prefixes client-side; 2048-dim ⇒ separate sift vector-config, never a drop-in for 2560-dim `embed`"
