    "tool-embed":
      model: "embed-lfm"           # back-compat alias for the MCP tool-search embedder
      hidden: true
    # capability shortcuts (hidden; convenience names → best model for that capability).
    # NOTE: these are MODEL shortcuts. TASK names (summarize/rewrite/extract) are dotprompt
    # prompt_ids (use `prompt_id:`), NOT model aliases — kept distinct on purpose.
    "reason":
      model: "oracle-llm"          # Qwen3.6-35B-A3B local (dev) / deepseek (prod) — the reasoning route
      hidden: true
    "chat":
      model: "oracle-llm"
      hidden: true
    "ocr":
      model: "ibm-granite/granite-vision-3.3-2b"
      hidden: true
    "instruct":
      model: "google/gemma-4-E4B-it"
      hidden: true
    # friendly capability/task model shortcuts (hidden). `summarize`/`rewrite`/`extract`
    # double as dotprompt prompt_ids — calling model=summarize + prompt_id=summarize composes
    # "the summarize model with the summarize prompt". `math` is llama-swap-only (vibethinker-3b).
    "summarize":
      model: "google/gemma-4-E4B-it"
      hidden: true
    "summarize-pro":
      model: "yuxinlu1/gemma-4-12B-it-Claude-4.6-4.8-Opus-GGUF"
      hidden: true
    "rewrite":
      model: "rewrite-fast"
      hidden: true
    "extract":
      model: "LiquidAI/LFM2-1.2B-Extract"
      hidden: true

# ── Prompt management (litellm dotprompt, OSS) ────────────────────────────────────
# Task prompts for summarize / rewrite / extract — files live in the llm-stack repo.
# See docs/CAPABILITIES.md for class→prompt ownership table.
# Activate via POST /v1/prompts/{prompt_id} or reference from model_list dotprompt entries.
# ── Task prompts (dotprompt) — registered so `prompt_id` resolves at request time ──
# Two parts are BOTH required (verified 2026-06-19):
#   1. litellm_settings.global_prompt_directory (set below) → the dir the loader reads.
#   2. these `prompts:` entries → register each prompt_id with the manager.
# DO NOT add per-prompt `prompt_directory` (crashes boot: "Cannot set prompt_directory when
# working with prompt_initializer"). Files = config/prompts/<id>.prompt. litellm's dotprompt
# renderer is SIMPLE {{var}} substitution only — NO Handlebars {{#if}}/{{/if}} (the .prompt
# files were de-conditionalised for this). Invoke: {"model": <any>, "prompt_id": "summarize",
# "prompt_variables": {"text": "..."}}. summarize/extract/rewrite verified returning correctly.
prompts:
  - prompt_id: summarize
    litellm_params:
      prompt_id: summarize
      prompt_integration: dotprompt
  - prompt_id: rewrite
    litellm_params:
      prompt_id: rewrite
      prompt_integration: dotprompt
  - prompt_id: extract
    litellm_params:
      prompt_id: extract
      prompt_integration: dotprompt

