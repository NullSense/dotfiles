    description: "summarize (tiny) · LFM2-2.6B-Exp ~1.6GB — RL-improved checkpoint (better instruction-following + lower fabrication than base). A/B candidate."
    metadata: { class: summarize, thinking: none, best_for: "low-stakes bulk summaries where VRAM is scarce", tags: [summarize, local, lfm2, tiny] }
