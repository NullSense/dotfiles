# ── VRAM coexistence (single 32 GB RTX 5090) ────────────────────────────────────────
# Default behavior (no matrix/groups): ONE model at a time — a request for model B
# unloads A. The `matrix` solver below instead keeps all small/medium models co-resident
# (32GB has the room) and lets only the big MoE models run solo. See the matrix block.
#
# ── matrix: solver-based concurrency (VALIDATED to parse on llama-swap v228, 2026-06-20) ──
# Semantics (docs/configuration.md): a model in NO set runs BY ITSELF (evicting all) —
# so every omitted big model keeps its current exclusive behavior, nothing breaks.
# `sets` is a MAPPING {name: DSL}; subset semantics = any subset of a set is a valid
# concurrent state. `evict_costs` = relative reload cost (higher → solver avoids
# evicting it). ⚠ llama-swap does NOT measure VRAM (maintainer: "users are responsible
# for resolving conflicts") — the set above is hand-estimated to fit 32 GB.
#
# CONFIRM headroom while the working set is loaded:
#       watch -n1 'nvidia-smi --query-gpu=memory.used --format=csv,noheader'
#   If it approaches ~31 GB, trim the `coresident` set. A timestamped backup of this
#   file is in this dir: config.yaml.bak-*  (restore = cp it back).
#
matrix:
  vars:
    e: octen-embedding-4b      # embeddings (sift + oracle) — keep warm
    s: gemma-4-e4b             # summarize  · NP=4 SPEC=off
    d: rewrite                 # shared E4B · rewrite + Sift RAG, 64K tools, ttl:0 (~11 GB)
    t: lfm2-embed-350m         # MCP tool-search embedder (~0.4 GB) — keep warm, never evict chat
    b: gemma-4-12b-opus        # strong summarizer/reasoner (~10 GB w/ MTP + 131k f16 KV)
    f: f2llm-embed             # Infinity F2LLM 2048-dim (legalkb / future sift legal tenant)
    r: bge-rerank              # Infinity bge-reranker-v2-m3 (~1.3 GB)
    q: qwen3-reranker-4b       # llama.cpp Q8_0 (~4.3 GB)
    j: jina-reranker-v3        # transformers sidecar (~1.5 GB bf16)
    z: zerank-2                # Infinity fp16 (~8 GB) — heavy
    n: nemotron-embed-1b       # vLLM NVFP4 2048-dim (~3.8 GB reserved) — sift candidate
    m: nemotron-rerank-1b      # vLLM bf16 cross-encoder (~4.7 GB reserved) — sift candidate
  evict_costs: { e: 10, s: 5, d: 7, t: 8, b: 6, f: 7, r: 6, q: 6, j: 5, z: 7, n: 7, m: 6 }
  sets:
    # 32GB 5090: keep all small/medium models hot together (any subset is a valid resident
    # state). Hand-estimated full-ctx f16-KV VRAM: embed 4.4 + e4b(s) ~5 + rewrite(vLLM E4B
    # NVFP4+MTP, util 0.35) ~11.15 + tool 0.4 + 12B ~10 ≈ 31GB, close to the 32GB ceiling —
    # watch headroom (see the CONFIRM note above) and trim GPU_UTIL further if it's tight.
    # Big MoE (qwen3.6-35b-a3b ~26GB, uncensored MXFP4 ~20GB) are in NO set → SOLO (evict all).
    coresident: "e & s & d & t & b"
    # legalkb working set: F2LLM embed + bge rerank must coexist (retrieval does embed→rerank
    # in one query), keep dictation (d, ttl:0) + tool-embed (t) alive. Query-time ≈ 17 GB;
    # legalkb BULK re-index observed ~16 GB for infinity alone → ~28 GB with d — watch
    # nvidia-smi during a re-index and drop INFINITY batch to 64 if it crowds 31 GB.
    # Deliberately excludes e/s/b: the solver evicts the summarizers + octen for legal work.
    # Light rerankers (r 1.3 + j 1.5) co-reside with embed; the heavy tiers get their own
    # sets so loading rerank-strong/-max evicts the light ones instead of OOMing:
    #   legal    ≈ f 3.5 + r 1.3 + j 1.5 + d 11 + t 0.4 ≈ 18 GB
    #   legal-q  ≈ f 3.5 + q 4.3 + d 11 + t 0.4         ≈ 19 GB
    #   legal-z  ≈ f 3.5 + z 8   + d 11 + t 0.4         ≈ 23 GB (watch during bulk runs)
    legal: "f & r & j & d & t"
    legal-q: "f & q & d & t"
    legal-z: "f & z & d & t"
    # sift Nemotron working set: embed→rerank in one query path, plus dictation (d) +
    # tool-embed (t). n 3.8 + m 4.7 + d 11 + t 0.4 ≈ 20 GB. Octen (e) deliberately
    # excluded — a sift cutover to nemotron means a NEW 2048-dim collection; during
    # re-index keep an eye on nvidia-smi (vLLM reservations are fixed, so no surprise
    # growth like infinity's batch-scaled peaks).
    sift-nemotron: "n & m & d & t"
#
# Why matrix over legacy `groups`: groups force all-or-nothing exclusive unloads; the
# matrix solver evicts the FEWEST/cheapest models to satisfy a request. (groups still
# work; a config uses matrix OR groups, not both.) On 32 GB the common working set
# (embed + both E4B instances + tool-embed + 12B) is all hot at once — what the old
# 12 GB box could never do.
