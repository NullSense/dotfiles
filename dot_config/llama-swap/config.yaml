# llama-swap — local VRAM model swapper in front of the ~/bin/llama-* wrappers.
# Each model's `cmd` just CALLS the existing wrapper with the swap-assigned ${PORT},
# so every tuned flag (CUDA, MTP, KV-quant, samplers, MODE) is preserved — the
# wrappers stay the single source of truth. See ~/notes/LLM-STACK.md for the full design.
#
# Run:   llama-swap --config ~/.config/llama-swap/config.yaml --listen 127.0.0.1:9292
# Then:  curl http://127.0.0.1:9292/v1/models   |  web UI at http://127.0.0.1:9292/ui
# Install (host): paru -S llama-swap   (AUR)  OR  grab a release binary from
#   https://github.com/mostlygeek/llama-swap/releases  (Go, single binary, MIT, 4.5k★)
#
# VALIDATE before relying on it:  llama-swap --config <this> --listen 127.0.0.1:9292
#   prints config errors on startup. The `groups`/`routing` schema moved between versions
#   (see the commented block at the bottom) — verify against your installed version.

healthCheckTimeout: 300   # wrappers do no-mmap loads (+ first-run downloads) — be generous
globalTTL: 300            # default: unload a model 5 min after its last request
logLevel: info
startPort: 9300           # ${PORT} auto-increments from here per model

models:
  # ── embeddings: sift + oracle. On-demand, evicts when idle (was ttl:0 always-on). ──
  octen-embedding-4b:
    cmd: env PORT=${PORT} /home/nullsense/bin/llm-servers/llama-octen
    proxy: http://127.0.0.1:${PORT}
    ttl: 300              # evict after 5 min idle (matches globalTTL); no longer pinned in VRAM
    name: "Octen-Embedding-4B (Q8_0)"
    aliases: [embed, octen-embed, qwen3-embedding-4b]
    description: "embedding · Octen-Embedding-4B (Qwen3-Embedding finetune), 2560-dim, last-token pooling. Shared embedder for sift + oracle."
    metadata: { class: embedding, thinking: na, best_for: "semantic search / RAG / retrieval", tags: [embedding, local, shared] }

  # ── tool-search embedder — LFM2.5-Embedding-350M (1024-dim CLS), Vulkan GPU (~0.4 GB VRAM).
  #    Used by litellm mcp_semantic_tool_filter. Co-resident with the small models via the
  #    matrix (var `t`) so loading it NEVER evicts the chat model. First load auto-downloads
  #    the official llama.cpp GGUF (~379 MB Q8_0); needs a llama.cpp build with the `lfm2-bidir`
  #    arch (update llama.cpp if it errors "unknown architecture lfm2-bidir"; if the Vulkan
  #    backend lacks it, fall back to -ngl 0). Filter fails-open (all tools) if it can't load.
  lfm2-embed-350m:
    cmd: env PORT=${PORT} llama-server -hf LiquidAI/LFM2.5-Embedding-350M-GGUF:Q8_0 --embeddings --pooling cls --ctx-size 512 --ubatch-size 512 --device CUDA0 -ngl 99 --host 127.0.0.1 --port ${PORT} --metrics
    proxy: http://127.0.0.1:${PORT}
    ttl: 3600
    name: "LFM2.5-Embedding-350M (tool search, CUDA GPU)"
    aliases: [embed-lfm, tool-embed, lfm2-embed]
    description: "embed·tools · LFM2.5-Embedding-350M 1024-dim CLS, CUDA GPU (~0.4 GB VRAM) — semantic MCP tool filter. Asymmetric query:/document: prefixes recommended."
    metadata: { class: embed, thinking: na, best_for: "MCP tool semantic search (litellm mcp_semantic_tool_filter)", tags: [embed, tools, local, lfm2, gpu, cuda] }

  # ── thinking-toggle convention ─────────────────────────────────────────────────────────
  # Each reasoning-capable model exposes two extra aliases:
  #   <model-id>:think  →  forces thinking ON  (chat_template_kwargs.enable_thinking: true)
  #   <model-id>:fast   →  forces thinking OFF (chat_template_kwargs.enable_thinking: false)
  # Callers pick the alias; no body params needed. Verified schema: filters.setParamsByID,
  # PR #535 (mostlygeek/llama-swap v228+). Keys auto-register as aliases AND are listed
  # explicitly in aliases: for UI visibility. See docs/CAPABILITIES.md for the full table.
  # ──────────────────────────────────────────────────────────────────────────────────────

  # ── summarization: cheap bulk model, escalation target ──
  gemma-4-e4b:
    cmd: env PORT=${PORT} MODE=sum /home/nullsense/bin/llm-servers/llama-gemma4b
    proxy: http://127.0.0.1:${PORT}
    ttl: 300
    name: "Gemma-4 E4B-it (QAT UD-Q4_K_XL)"
    aliases: [summarize-cheap, gemma4-e4b, gemma-e4b, "gemma-4-e4b:think", "gemma-4-e4b:fast"]
    description: "summarize · Gemma-4 E4B QAT UD-Q4_K_XL — fast, faithful bulk summaries (0% fabrication on the oracle set), near-BF16 quality at 4.0GB. Thinking toggleable (default off). oracle's cheap-first summariser."
    metadata: { class: summarize, thinking: "toggle (default off)", best_for: "faithful extractive summaries, instruction-following, dictation rewrite", tags: [summarize, instruct, local, gemma, faithful] }
    filters:
      setParamsByID:
        "gemma-4-e4b:think":
          chat_template_kwargs:
            enable_thinking: true
        "gemma-4-e4b:fast":
          chat_template_kwargs:
            enable_thinking: false

  gemma-4-12b-opus:
    cmd: env PORT=${PORT} /home/nullsense/bin/llm-servers/llama-gemma4
    proxy: http://127.0.0.1:${PORT}
    ttl: 300
    name: "Gemma-4 12B-it Claude-Opus-distill (Q4_K_M) + MTP"
    aliases: [summarize-strong, gemma4-12b, gemma-12b, gemma4-opus-distill, "gemma-4-12b-opus:think", "gemma-4-12b-opus:fast"]
    description: "summarize·reason · Gemma-4 12B Claude-Opus-distill + MTP — richer/analytical summaries, escalation target. Thinking toggleable (default on)."
    metadata: { class: "summarize·reason", thinking: "toggle (default on)", best_for: "analytical summaries needing reasoning; escalation from summarize", tags: [summarize, reason, local, gemma, analytical] }
    filters:
      setParamsByID:
        "gemma-4-12b-opus:think":
          chat_template_kwargs:
            enable_thinking: true
        "gemma-4-12b-opus:fast":
          chat_template_kwargs:
            enable_thinking: false

  # ── E4B quant ladder (2026-06-19 bench): bartowski PTQ Q4_K_M / Q8_0 baselines.
  #    summarize-cheap now runs unsloth QAT UD-Q4_K_XL (better+smaller); these stay as the
  #    PTQ ablation baselines. Finding: faithfulness is quant-robust (Q4≈Q5≈Q8, 0% fab/leak)
  #    so Q4 = max VRAM savings with no faithfulness cost. Kept as on-demand alternates
  #    (ttl 120s = evict fast). See ~/Programming/llm-stack/docs/leaderboard.md. ──
  gemma-4-e4b-q4:
    cmd: env PORT=${PORT} MODE=sum MODEL=/home/nullsense/.lmstudio/models/bartowski/google_gemma-4-E4B-it-GGUF/google_gemma-4-E4B-it-Q4_K_M.gguf /home/nullsense/bin/llm-servers/llama-gemma4b
    proxy: http://127.0.0.1:${PORT}
    ttl: 120
    name: "Gemma-4 E4B-it Q4_K_M (bench)"
    aliases: [e4b-q4]
    description: "summarize · Gemma-4 E4B Q4_K_M — quant-ablation vs gemma-4-e4b (QAT UD-Q4_K_XL). Max VRAM savings, faithfulness quant-robust."
    metadata: { class: summarize, thinking: "toggle (default off)", best_for: "smallest-VRAM faithful summaries (bench)", tags: [summarize, local, gemma, bench] }
  gemma-4-e4b-q8:
    cmd: env PORT=${PORT} MODE=sum MODEL=/home/nullsense/.lmstudio/models/bartowski/google_gemma-4-E4B-it-GGUF/google_gemma-4-E4B-it-Q8_0.gguf /home/nullsense/bin/llm-servers/llama-gemma4b
    proxy: http://127.0.0.1:${PORT}
    ttl: 120
    name: "Gemma-4 E4B-it Q8_0 (bench)"
    aliases: [e4b-q8]
    description: "summarize · Gemma-4 E4B Q8_0 — quant-ablation vs gemma-4-e4b (QAT UD-Q4_K_XL). Highest-fidelity quant."
    metadata: { class: summarize, thinking: "toggle (default off)", best_for: "highest-quant faithful summaries (bench)", tags: [summarize, local, gemma, bench] }

  # ── dictation rewrite — DEDICATED MTP-optimized E4B (NP=1 + SPEC=on draft) ──
  #    hyprwhspr dictation routes here via litellm `rewrite-fast`. llama-swap loads it ON
  #    DEMAND and evicts on TTL → replaces the old always-on :8083 service (no permanent 5 GB).
  #    SEPARATE from gemma-4-e4b (summarize, NP=4 SPEC=off) on purpose: MTP draft (~80% accept,
  #    ~40% faster, p50 136 vs 227 ms) wins for single-stream dictation but FIGHTS NP=4 batch
  #    summarization. Same weights, so llama-swap swaps between them on demand — alternating
  #    dictation↔summarize reloads (~10 s); each evicts when idle. ttl 900 keeps it warm
  #    through a dictation session. Thinking stays off per-request (hyprwhspr extra_body).
  rewrite:
    cmd: env PORT=${PORT} NP=1 MODE=sum SPEC=on /home/nullsense/bin/llm-servers/llama-gemma4b
    proxy: http://127.0.0.1:${PORT}
    ttl: 900
    name: "Rewrite · Gemma-4 E4B + MTP (dictation, NP=1)"
    description: "rewrite · Gemma-4 E4B QAT UD-Q4_K_XL + matching QAT-MTP draft — low-latency dictation/transcript cleanup. On-demand via llama-swap (replaces the old always-on :8083 server)."
    metadata: { class: rewrite, thinking: "none (off for speed)", best_for: "dictation/transcript rewrite, short low-latency cleanups", tags: [rewrite, dictation, local, gemma, mtp] }


