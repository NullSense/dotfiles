# llama-swap — local VRAM model swapper in front of the ~/bin/llama-* wrappers.
# Each model's `cmd` just CALLS the existing wrapper with the swap-assigned ${PORT},
# so every tuned flag (CUDA, MTP, KV-quant, samplers, MODE) is preserved — the
# wrappers stay the single source of truth. See ~/notes/LLM-STACK.md for the full design.
#
# Run:   llama-swap --config ~/.config/llama-swap/config.yaml --listen 127.0.0.1:9292
# Then:  curl http://127.0.0.1:9292/v1/models   |  web UI at http://127.0.0.1:9292/ui
# Install (host): paru -S llama-swap   (AUR)  OR  grab a release binary from
#   https://github.com/mostlygeek/llama-swap/releases  (Go, single binary, MIT, 4.5k★)
#
# VALIDATE before relying on it:  llama-swap --config <this> --listen 127.0.0.1:9292
#   prints config errors on startup. The `groups`/`routing` schema moved between versions
#   (see the commented block at the bottom) — verify against your installed version.

healthCheckTimeout: 300   # wrappers do no-mmap loads (+ first-run downloads) — be generous
globalTTL: 300            # default: unload a model 5 min after its last request
logLevel: info
startPort: 9300           # ${PORT} auto-increments from here per model

models:
  # ── embeddings: sift + oracle. On-demand, evicts when idle (was ttl:0 always-on). ──
  octen-embedding-4b:
    cmd: env PORT=${PORT} /home/nullsense/bin/llm-servers/llama-octen
    proxy: http://127.0.0.1:${PORT}
    ttl: 300              # evict after 5 min idle (matches globalTTL); no longer pinned in VRAM
    name: "Octen-Embedding-4B (Q8_0)"
    aliases: [embed, octen-embed, qwen3-embedding-4b]
    description: "embedding · Octen-Embedding-4B (Qwen3-Embedding finetune), 2560-dim, last-token pooling. Shared embedder for sift + oracle."
    metadata: { engine: "llama.cpp", hf: "Octen/Octen-Embedding-4B", class: embedding, thinking: na, best_for: "semantic search / RAG / retrieval", tags: [embedding, local, shared] }

  # ── tool-search embedder — LFM2.5-Embedding-350M (1024-dim CLS), Vulkan GPU (~0.4 GB VRAM).
  #    Used by litellm mcp_semantic_tool_filter. Co-resident with the small models via the
  #    matrix (var `t`) so loading it NEVER evicts the chat model. First load auto-downloads
  #    the official llama.cpp GGUF (~379 MB Q8_0); needs a llama.cpp build with the `lfm2-bidir`
  #    arch (update llama.cpp if it errors "unknown architecture lfm2-bidir"; if the Vulkan
  #    backend lacks it, fall back to -ngl 0). Filter fails-open (all tools) if it can't load.
  lfm2-embed-350m:
    # ctx 8192 ≫ ubatch 512: -ub is the PER-INPUT token cap (pooled embeddings must fit one
    # ubatch); -c bounds the TOTAL tokens of a batched /v1/embeddings request. At -c 512 a
    # multi-input batch overflowed instantly ("Context size has been exceeded" — sift bulk
    # indexing, 2026-07-20). KV for 8k ctx on a 350M model is negligible VRAM.
    cmd: env PORT=${PORT} llama-server -hf LiquidAI/LFM2.5-Embedding-350M-GGUF:Q8_0 --embeddings --pooling cls --ctx-size 8192 --ubatch-size 512 --device CUDA0 -ngl 99 --host 127.0.0.1 --port ${PORT} --metrics
    proxy: http://127.0.0.1:${PORT}
    ttl: 3600
    name: "LFM2.5-Embedding-350M (tool search, CUDA GPU)"
    aliases: [embed-lfm, tool-embed, lfm2-embed]
    description: "embed·tools · LFM2.5-Embedding-350M 1024-dim CLS, CUDA GPU (~0.4 GB VRAM) — semantic MCP tool filter. Asymmetric query:/document: prefixes recommended."
    metadata: { engine: "llama.cpp", hf: "LiquidAI/LFM2.5-Embedding-350M-GGUF", class: embed, thinking: na, best_for: "MCP tool semantic search (litellm mcp_semantic_tool_filter)", tags: [embed, tools, local, lfm2, gpu, cuda] }

  # ── Infinity models (michaelfeil/infinity — native uv project, ~/Programming/llm-stack/infinity) ──
  #    One llama-swap entry per model = independent on-demand load/evict. All API routes live under
  #    /v1 (--url-prefix /v1 → /v1/embeddings, /v1/rerank verified 2026-07-18); /health stays at ROOT,
  #    which is llama-swap's default probe — do not add a checkEndpoint. useModelName pins the upstream
  #    model field so every alias (incl. the raw HF repo ids legalkb sends) routes correctly.
  #    Batch sizes = the 2026-07-02 RTX 5090 benchmarks from the infinity mise.toml (embed 128 →
  #    254 texts/s; VRAM scales with batch×seq — post-Absatz legalkb chunks p99≈370 tok keep it sane).
  #    Consumers: legalkb (via :9292/v1) today; sift legalkb-tenant later (provider=custom,
  #    model=embed-legal, dimensions=2048, api_base=http://127.0.0.1:9292/v1 — 2048 ≠ octen's 2560,
  #    so it is a SEPARATE sift vector-config/collection by construction, never a swap-in).
  f2llm-embed:
    # CONTAINERIZED 2026-07-18 (image built from the project's own uv.lock — Modal-ready;
    # native venv remains the dev fallback: swap `docker run …` for
    # `.venv/bin/infinity_emb v2 --host 127.0.0.1 --port ${PORT} <same flags>`).
    # Score parity container↔native verified (bge 0.45535 both).
    cmd: docker run --rm -e PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True --name swap-f2llm --init --gpus all -p 127.0.0.1:${PORT}:7997 -v /home/nullsense/.cache/huggingface:/hf infinity-serving:local --engine torch --device cuda --dtype float16 --no-bettertransformer --model-id codefuse-ai/F2LLM-v2-1.7B --served-model-name f2llm-embed --batch-size 128 --url-prefix /v1
    cmdStop: docker stop swap-f2llm
    proxy: http://127.0.0.1:${PORT}
    useModelName: f2llm-embed
    ttl: 300
    name: "F2LLM-v2-1.7B (Infinity, 2048-dim)"
    aliases: [embed-legal, f2llm, "codefuse-ai/F2LLM-v2-1.7B"]
    description: "embedding · F2LLM-v2-1.7B fp16 2048-dim via Infinity — wins German legal retrieval (GerDaLIR/LeCaRDv2, see legalkb 2026-07-02 reeval). legalkb embedder now; sift legalkb-tenant embedding later. Batch 128 (5090: 254 texts/s)."
    metadata: { engine: "infinity", hf: "codefuse-ai/F2LLM-v2-1.7B", class: embedding, thinking: na, best_for: "German legal retrieval (legalkb; future sift legalkb tenant)", tags: [embedding, local, legal, infinity] }

  bge-rerank:
    cmd: docker run --rm -e PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True --name swap-bge --init --gpus all -p 127.0.0.1:${PORT}:7997 -v /home/nullsense/.cache/huggingface:/hf infinity-serving:local --engine torch --device cuda --dtype float16 --no-bettertransformer --model-id BAAI/bge-reranker-v2-m3 --served-model-name bge-rerank --batch-size 16 --url-prefix /v1
    cmdStop: docker stop swap-bge
    proxy: http://127.0.0.1:${PORT}
    useModelName: bge-rerank
    ttl: 300
    name: "bge-reranker-v2-m3 (Infinity)"
    aliases: [rerank, rerank-legal, "BAAI/bge-reranker-v2-m3"]
    description: "rerank · bge-reranker-v2-m3 cross-encoder via Infinity (/v1/rerank, sigmoid scores). legalkb reranker now; local reranker candidate for sift's RerankerService. ~1.3 GB."
    metadata: { engine: "infinity", hf: "BAAI/bge-reranker-v2-m3", class: rerank, thinking: na, best_for: "cross-encoder reranking (legalkb; sift local rerank later)", tags: [rerank, local, legal, infinity] }

  # ── Reranker fleet (2026-07-18) — four models, three backends, one contract (/v1/rerank) ──
  #    Default `rerank` alias stays on bge-rerank (cheapest, MIRACL-strongest). The others are
  #    opt-in tiers: rerank-strong (Qwen3-4B via llama.cpp — the 2026-07-02 legalkb merit pick,
  #    now servable since llama.cpp #15824), rerank-fast (jina-v3 listwise sidecar — BEIR SOTA
  #    at 0.6B), rerank-max (zerank-2 via the rerank sidecar — tops ELO boards; ⚠ CC-BY-NC
  #    weights, fine for personal use, NOT for commercial serving). Raw HF repo-ids are aliases so clients
  #    can pass them verbatim. A/B on German legal pairs before changing legalkb's registry.
  qwen3-reranker-4b:
    # ⚠ GGUF MUST be the official-converter build (Voodisss) — community conversions lack
    #   cls.output.weight → garbage 4.5e-23 scores (llama.cpp #16407). --reranking implies
    #   pooling=rank + embedding. -np 4 parallelizes doc scoring within /v1/rerank.
    # ctx 16384/np4 = 4k per rerank slot (query+doc pairs are short) + q8 KV — keeps the whole
    # process ~6 GB so it coexists in legal-q; 32k f16 KV (~9 GB total) OOM'd next to rewrite.
    cmd: env PORT=${PORT} llama-server --model /home/nullsense/.lmstudio/models/Voodisss/Qwen3-Reranker-4B-GGUF-llama_cpp/Qwen3-Reranker-4B.Q8_0.gguf --reranking --device CUDA0 -ngl 99 --ctx-size 32768 -np 4 --batch-size 8192 --ubatch-size 8192 --flash-attn on --cache-type-k q8_0 --cache-type-v q8_0 --no-mmap --host 127.0.0.1 --port ${PORT} --metrics
    proxy: http://127.0.0.1:${PORT}
    ttl: 300
    name: "Qwen3-Reranker-4B (llama.cpp Q8_0)"
    aliases: [rerank-strong, "Qwen/Qwen3-Reranker-4B"]
    description: "rerank · Qwen3-Reranker-4B Q8_0 via llama.cpp native rerank (yes/no head). The legalkb 2026-07-02 merit pick, unblocked from infinity's ST pin. MTEB-R 69.76, MIRACL 67.52. ~4.3 GB."
    metadata: { engine: "llama.cpp", hf: "Qwen/Qwen3-Reranker-4B", class: rerank, thinking: na, best_for: "strong multilingual reranking (legalkb candidate; sift later)", tags: [rerank, local, qwen, llamacpp] }

  jina-reranker-v3:
    # Custom listwise arch (last-but-not-late, trust_remote_code) — not servable by infinity or
    # mainline llama.cpp (PR #22576 draft), so a minimal transformers sidecar speaks /v1/rerank.
    # Scores ≤64 docs in ONE forward pass (131K window) — fastest quality tier.
    cmd: docker run --rm -e PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True --name swap-jina --init --gpus all -p 127.0.0.1:${PORT}:7998 -v /home/nullsense/.cache/huggingface:/hf -e RERANK_BACKEND=jina -e SERVED_MODEL_NAME=jina-reranker-v3 rerank-sidecar:local
    cmdStop: docker stop swap-jina
    proxy: http://127.0.0.1:${PORT}
    ttl: 300
    name: "jina-reranker-v3 (listwise sidecar, bf16)"
    aliases: [rerank-fast, "jinaai/jina-reranker-v3"]
    description: "rerank · jina-reranker-v3 0.6B listwise (BEIR 61.94 — SOTA at size; 93 languages). Own sidecar (~/Programming/llm-stack/jina-reranker-v3). ~1.5 GB."
    metadata: { engine: "transformers-sidecar", hf: "jinaai/jina-reranker-v3", class: rerank, thinking: na, best_for: "low-latency SOTA reranking, ≤64 docs/pass", tags: [rerank, local, jina, listwise, sidecar] }

  zerank-2:
    # NOT servable by infinity after all (verified 2026-07-18): its ST config uses the
    # sentence-transformers 5.x module layout (`sentence_transformers.base`) — infinity's
    # ST<4.0 pin dies on import, the same signature that killed Qwen3-Reranker there.
    # Served from the rerank sidecar venv (modern ST 5.x + CrossEncoder trust_remote_code).
    # ⚠ CC-BY-NC-4.0 weights: personal/eval use only.
    cmd: docker run --rm -e PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True --name swap-zerank --init --gpus all -p 127.0.0.1:${PORT}:7998 -v /home/nullsense/.cache/huggingface:/hf -e RERANK_BACKEND=zerank -e SERVED_MODEL_NAME=zerank-2 -e RERANK_SLICE=2 rerank-sidecar:local
    cmdStop: docker stop swap-zerank
    proxy: http://127.0.0.1:${PORT}
    useModelName: zerank-2
    ttl: 300
    name: "zerank-2 (Infinity, CC-BY-NC)"
    aliases: [rerank-max, "zeroentropy/zerank-2-reranker"]
    description: "rerank · zerank-2 4B (Qwen3-4B base, zELO-trained — tops rerank ELO boards; strong on legal/finance). ⚠ CC-BY-NC: personal/eval only. ~8 GB fp16."
    metadata: { engine: "transformers-sidecar", hf: "zeroentropy/zerank-2-reranker", class: rerank, thinking: na, best_for: "max-accuracy reranking eval (legal/finance); non-commercial", tags: [rerank, local, zerank, infinity, nc-license] }

  # ── NVIDIA Nemotron retrieval pair (2026-07-22) — sift embed+rerank candidates on vLLM ──
  #    Both run on the v0.25.0 image (⚠ the NVFP4 embed checkpoint is BROKEN on v0.23.x/0.24.x
  #    per its card — do not downgrade the image). Wrappers own all tuning (CUDA-graph capture
  #    sizes, GPU_UTIL, trust-remote-code, the mandatory rerank score template).
  nemotron-embed-1b:
    cmd: env PORT=${PORT} /home/nullsense/bin/llm-servers/vllm-nemotron-embed
    cmdStop: docker stop vllm-nemotron-embed
    proxy: http://127.0.0.1:${PORT}
    useModelName: nemotron-embed-1b
    ttl: 300
    name: "Nemotron-3-Embed-1B (vLLM NVFP4, 2048-dim)"
    aliases: [embed-nemotron, "nvidia/Nemotron-3-Embed-1B-NVFP4"]
    description: "embedding · Nemotron-3-Embed-1B NVFP4 (Ministral-3-3B pruned, avg pooling, 2048-dim Matryoshka) via vLLM. ⚠ /v1/embeddings callers MUST prefix 'query: '/'passage: '. 2048 ≠ octen's 2560 ⇒ separate sift collection. ~3.8 GB reserved."
    metadata: { engine: "vllm", hf: "nvidia/Nemotron-3-Embed-1B-NVFP4", class: embedding, thinking: na, best_for: "sift embed candidate (MTEB-strong, NVFP4-fast on Blackwell)", tags: [embedding, local, nvidia, vllm, nvfp4] }

  nemotron-rerank-1b:
    cmd: env PORT=${PORT} /home/nullsense/bin/llm-servers/vllm-nemotron-rerank
    cmdStop: docker stop vllm-nemotron-rerank
    proxy: http://127.0.0.1:${PORT}
    useModelName: nemotron-rerank-1b
    ttl: 300
    name: "llama-nemotron-rerank-1b-v2 (vLLM bf16)"
    aliases: [rerank-nemotron, "nvidia/llama-nemotron-rerank-1b-v2"]
    description: "rerank · llama-nemotron-rerank-1b-v2 (Llama-3.2-1B bidirectional cross-encoder, avg pooling) via vLLM /v1/rerank. Score template + trust-remote-code enforced by the wrapper. 8k pairs. ~4.7 GB reserved."
    metadata: { engine: "vllm", hf: "nvidia/llama-nemotron-rerank-1b-v2", class: rerank, thinking: na, best_for: "sift rerank candidate (NVIDIA retrieval pair with nemotron-embed-1b)", tags: [rerank, local, nvidia, vllm] }

  # ── thinking-toggle convention ─────────────────────────────────────────────────────────
  # Each reasoning-capable model exposes two extra aliases:
  #   <model-id>:think  →  forces thinking ON  (chat_template_kwargs.enable_thinking: true)
  #   <model-id>:fast   →  forces thinking OFF (chat_template_kwargs.enable_thinking: false)
  # Callers pick the alias; no body params needed. Verified schema: filters.setParamsByID,
  # PR #535 (mostlygeek/llama-swap v228+). Keys auto-register as aliases AND are listed
  # explicitly in aliases: for UI visibility. See docs/CAPABILITIES.md for the full table.
  # ──────────────────────────────────────────────────────────────────────────────────────

  # ── summarize: VRAM-ADAPTIVE summariser — diffusiongemma when there's room, else E4B ──
  # The `cmd` measures live free VRAM at load and execs the biggest summariser that fits
  # (diffusiongemma-26B vLLM ~22GB → gemma-4-E4B llama.cpp ~6GB → fail-to-cloud). Adapts to any
  # game automatically. SHORT ttl so an idle summariser evicts fast and re-checks VRAM next load.
  # cmdStop stops whichever backend it picked (docker container OR llama-server PID).
  summarize:
    cmd: env PORT=${PORT} /home/nullsense/bin/llm-servers/llama-summarize-auto
    cmdStop: /home/nullsense/bin/llm-servers/llama-summarize-stop ${PID}
    proxy: http://127.0.0.1:${PORT}
    useModelName: summarize   # both backends serve as "summarize"; pin the upstream name so the
                              # summarize-cheap alias (or any) doesn't 404 the vLLM served-model-name
    ttl: 120
    name: "Summarize (VRAM-adaptive: diffusiongemma ⟂ E4B)"
    aliases: [summarize-cheap]
    description: "summarize · picks diffusiongemma-26B (vLLM NVFP4, ~22GB, best quality+speed) when VRAM is free, else gemma-4-E4B (llama.cpp, ~6GB, game-friendly); fails so the caller falls back to cloud if neither fits. Thresholds env-overridable (SUMMARIZE_DIFF_MIN_MB / _E4B_MIN_MB); diffusion gpu-util derived from free VRAM."
    metadata: { engine: "vllm⟂llama.cpp", hf: "nvidia/diffusiongemma-26B-A4B-it-NVFP4 ⟂ google/gemma-4-E4B-it", class: summarize, thinking: "off", best_for: "VRAM-adaptive bulk summaries alongside gaming", tags: [summarize, adaptive, local, vllm, diffusion, gemma] }

  # ── summarization: cheap bulk model (direct E4B; also dictation rewrite / escalation) ──
  gemma-4-e4b:
    cmd: env PORT=${PORT} MODE=sum /home/nullsense/bin/llm-servers/llama-gemma4b
    proxy: http://127.0.0.1:${PORT}
    ttl: 300
    name: "Gemma-4 E4B-it (QAT UD-Q4_K_XL)"
    aliases: [gemma4-e4b, gemma-e4b, "gemma-4-e4b:think", "gemma-4-e4b:fast"]
    description: "summarize · Gemma-4 E4B QAT UD-Q4_K_XL — fast, faithful bulk summaries (0% fabrication on the oracle set), near-BF16 quality at 4.0GB. Thinking toggleable (default off). oracle's cheap-first summariser."
    metadata: { engine: "llama.cpp", hf: "google/gemma-4-E4B-it", class: summarize, thinking: "toggle (default off)", best_for: "faithful extractive summaries, instruction-following, dictation rewrite", tags: [summarize, instruct, local, gemma, faithful] }
    filters:
      setParamsByID:
        "gemma-4-e4b:think":
          chat_template_kwargs:
            enable_thinking: true
        "gemma-4-e4b:fast":
          chat_template_kwargs:
            enable_thinking: false

  gemma-4-12b-opus:
    cmd: env PORT=${PORT} /home/nullsense/bin/llm-servers/llama-gemma4
    proxy: http://127.0.0.1:${PORT}
    ttl: 300
    name: "Gemma-4 12B-it Claude-Opus-distill (Q4_K_M) + MTP"
    aliases: [summarize-strong, gemma4-12b, gemma-12b, gemma4-opus-distill, "gemma-4-12b-opus:think", "gemma-4-12b-opus:fast"]
    description: "summarize·reason · Gemma-4 12B Claude-Opus-distill + MTP — richer/analytical summaries, escalation target. Thinking toggleable (default on)."
    metadata: { engine: "llama.cpp", hf: "yuxinlu1/gemma-4-12B-it-Claude-4.6-4.8-Opus-GGUF", class: "summarize·reason", thinking: "toggle (default on)", best_for: "analytical summaries needing reasoning; escalation from summarize", tags: [summarize, reason, local, gemma, analytical] }
    filters:
      setParamsByID:
        "gemma-4-12b-opus:think":
          chat_template_kwargs:
            enable_thinking: true
        "gemma-4-12b-opus:fast":
          chat_template_kwargs:
            enable_thinking: false

  # ── shared rewrite + Sift RAG — vLLM E4B (NVFP4 W4A16 + MTP n=3) ────────────────────────
  #    llama-swap-managed on a DYNAMIC port (no more standalone fixed-:8001 container — that
  #    boot-racing service was retired 2026-07-20: it bound :8001 directly and the first
  #    dictation after boot raced its model load → "port 8001 has no rewrite model"). Now it's
  #    a normal llama-swap model: Gemma-4 E4B text-only NVFP4, serves `rewrite`, Sift's
  #    structured decomposition, and Sift's tool-using agent from one warm process. The
  #    64K limit does not create a second weight copy: vLLM's fixed GPU_UTIL reservation
  #    already owns the KV pool, and short rewrite calls use only the cache they need.
  #    Contract names hyprwhspr-ai dictation (backends.json), LiteLLM rewrite-fast,
  #    sift-decompose, and sift-agent all resolve here through llama-swap (:9292) /
  #    litellm (:4000), never a direct port. ttl:0 keeps it resident (dictation is latency-
  #    critical); the first request after boot loads it (~40s, and llama-swap queues the request
  #    through the load instead of erroring — which is what fixes the boot race).
  rewrite:
    # Use the checkpoint's own chat_template.jinja: it is Gemma-4 tool-capable and
    # preserves the text-only checkpoint's trained rewrite behavior. vLLM's generic
    # example tool template leaks planning text on ordinary no-tool requests here.
    cmd: env PORT=${PORT} MAXLEN=65536 MAX_SEQS=2 /home/nullsense/bin/llm-servers/vllm-gemma4b --enable-auto-tool-choice --tool-call-parser gemma4 --reasoning-parser gemma4
    cmdStop: docker stop vllm-gemma4b
    proxy: http://127.0.0.1:${PORT}
    useModelName: rewrite
    ttl: 0
    aliases: [sift-rag-e4b, sift-decompose, sift-agent]
    name: "Shared E4B · Rewrite + Sift RAG (vLLM NVFP4 + MTP, 64K tools)"
    description: "rewrite·agent·rag · Gemma-4 E4B NVFP4 W4A16 + MTP n=3 on vLLM — resident 64K context, native Gemma-4 automatic tool calling and separated reasoning with the checkpoint template, structured output, and low-latency dictation cleanup from one physical slot."
    metadata: { engine: "vllm", hf: "principled-intelligence/gemma-4-E4B-it-text-only", class: "rewrite·agent·rag", thinking: "dynamic per request (default off; Sift agent on)", best_for: "dictation rewrite, Sift decomposition, and Sift agentic RAG", tags: [rewrite, dictation, agent, rag, tools, local, vllm, gemma, mtp, nvfp4] }

  # (Retired 2026-07-09: LFM2-2.6B + LFM2-1.2B-Extract generative bench entries removed —
  #  unused, not in the matrix. The LFM2.5-Embedding-350M *embedding* entry above stays.)

  # ── abliterated/uncensored chat — Qwen3.6-35B-A3B Uncensored (Harmony MXFP4_MOE) ──
  #    On the 5090 (Blackwell) MXFP4 gets native FP4 acceleration — the opposite of gfx1031,
  #    where it was software-decoded — so the 20GB MXFP4_MOE is now the right build, fully
  #    GPU-resident (no --n-cpu-moe) in 32GB VRAM. (The Wasserstein IQ3_M downgrade was a
  #    12GB-VRAM compromise; reverted.)
  qwen3.6-35b-uncensored:
    # RTX 5090 / Blackwell tuned from model-card guidance:
    # - recommended MXFP4_MOE quant, fully GPU-resident (-ngl 999)
    # - >=262K context to preserve Qwen3.6 thinking capabilities
    # - q4_0 KV + flash-attn to make long context fit in 32GB VRAM
    # - batch/ubatch/parallel from 5090 llama.cpp benchmark-style serving
    # - coding/agent sampler: temp 0.6, top_p 0.95, top_k 20, min_p 0, presence penalty 0
    cmd: env PORT=${PORT} llama-server --model /home/nullsense/.lmstudio/models/LuffyTheFox/Qwen3.6-35B-A3B-Uncensored-Harmony-GGUF/Qwen3.6-35B-A3B-Uncensored-Harmony-MXFP4_MOE.gguf --alias qwen-uncensored --host 127.0.0.1 --port ${PORT} --device CUDA0 --fit off --n-gpu-layers 999 --ctx-size 262144 --flash-attn on --cache-type-k q4_0 --cache-type-v q4_0 --batch-size 1024 --ubatch-size 256 --parallel 1 --threads 8 --threads-batch 8 --no-mmap --jinja --temp 0.6 --top-p 0.95 --top-k 20 --min-p 0 --presence-penalty 0 --metrics
