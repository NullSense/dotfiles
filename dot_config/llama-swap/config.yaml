# llama-swap — local VRAM model swapper in front of the ~/bin/llama-* wrappers.
# Each model's `cmd` just CALLS the existing wrapper with the swap-assigned ${PORT},
# so every tuned flag (Vulkan/RADV, MTP, KV-quant, samplers, MODE) is preserved — the
# wrappers stay the single source of truth. See ~/notes/LLM-STACK.md for the full design.
#
# Run:   llama-swap --config ~/.config/llama-swap/config.yaml --listen 127.0.0.1:9292
# Then:  curl http://127.0.0.1:9292/v1/models   |  web UI at http://127.0.0.1:9292/ui
# Install (host): paru -S llama-swap   (AUR)  OR  grab a release binary from
#   https://github.com/mostlygeek/llama-swap/releases  (Go, single binary, MIT, 4.5k★)
#
# VALIDATE before relying on it:  llama-swap --config <this> --listen 127.0.0.1:9292
#   prints config errors on startup. The `groups`/`routing` schema moved between versions
#   (see the commented block at the bottom) — verify against your installed version.

healthCheckTimeout: 300   # wrappers do no-mmap loads (+ first-run downloads) — be generous
globalTTL: 300            # default: unload a model 5 min after its last request
logLevel: info
startPort: 9300           # ${PORT} auto-increments from here per model

models:
  # ── embeddings: sift + oracle. Keep this one effectively always-on (see groups) ──
  embed:
    cmd: env PORT=${PORT} /home/nullsense/bin/llm-servers/llama-octen
    proxy: http://127.0.0.1:${PORT}
    ttl: 0                # never auto-unload (still evictable for VRAM unless in a persistent group)
    aliases: [octen-embed, qwen3-embedding-4b]
    description: Octen-Embedding-4B (Qwen3-Embedding finetune), 2560-dim, last-token pooling

  # ── summarization: cheap bulk model, escalation target ──
  summarize-cheap:
    cmd: env PORT=${PORT} MODE=sum /home/nullsense/bin/llm-servers/llama-gemma4b
    proxy: http://127.0.0.1:${PORT}
    ttl: 300
    aliases: [gemma4-e4b]
    description: Gemma-4 E4B — fast bulk summaries (oracle summarize-cheap)

  summarize-strong:
    cmd: env PORT=${PORT} /home/nullsense/bin/llm-servers/llama-gemma4
    proxy: http://127.0.0.1:${PORT}
    ttl: 300
    aliases: [gemma4-12b, gemma4-opus-distill]
    description: Gemma-4 12B Opus-distill + MTP — escalation only (oracle summarize-strong)

  # ── candidate cheap summarizer being benchmarked vs the 12B ──
  vibethinker-3b:
    cmd: env PORT=${PORT} /home/nullsense/bin/llm-servers/llama-vibethinker
    proxy: http://127.0.0.1:${PORT}
    ttl: 300
    description: VibeThinker-3B (Qwen2.5-Coder reasoning) — summarization/dictation A/B

  # ── general reasoning / coding (oracle-llm, big local chat) ──
  oracle-llm:
    cmd: env PORT=${PORT} /home/nullsense/bin/llm-servers/llama-qwen36
    proxy: http://127.0.0.1:${PORT}
    ttl: 600
    aliases: [qwen3.6-a3b, qwen3.6-35b-a3b-apex]
    description: Qwen3.6 35B-A3B (MoE) + MTP — oracle's optional local reasoning LLM

  # ── GLiNER2 NER is ORACLE-OWNED, not in this stack (decided 2026-06-18). Oracle runs it
  #     in-process/sidecar with GLINER2_DEVICE=auto (GPU when a card is present, CPU fallback).
  #     It's not a llama.cpp/OpenAI-shaped model, so it doesn't belong behind llama-swap.

# ── VRAM coexistence (single 12 GB GPU) ─────────────────────────────────────────────
# Default behavior (no groups): ONE model at a time — a request for model B unloads A.
# That means `embed` unloads whenever a summarizer loads, which breaks concurrent
# sift+summarize. Octen (4.4 GB) co-fits with E4B (5.5 GB) or VibeThinker (3.3 GB) but NOT
# with the 12 B (7.4 GB → ~11.8 GB total, spills to GTT). To keep `embed` resident
# alongside the small summarizers, define a persistent group. ⚠ The groups schema differs
# by llama-swap version — recent releases nest it under `routing:`. Verify with a startup
# validation run, then enable ONE of these forms:
#
# Recent schema (routing/groups):
# routing:
#   router:
#     settings:
#       groups:
#         resident:
#           persistent: true        # cannot be evicted by other groups
#           members: [embed]
#         small-swap:
#           swap: true              # only one of these at a time
#           exclusive: false        # may co-exist with `resident`
#           members: [summarize-cheap, vibethinker-3b]
#         big-swap:
#           swap: true
#           exclusive: true         # loading these evicts everything incl. embed
#           members: [summarize-strong, oracle-llm]
#
# Older top-level `groups:` form (pre-2026-04):
# groups:
#   resident: { persistent: true, members: [embed] }
#   small-swap: { swap: true, exclusive: false, members: [summarize-cheap, vibethinker-3b] }
#   big-swap:   { swap: true, exclusive: true,  members: [summarize-strong, oracle-llm] }
