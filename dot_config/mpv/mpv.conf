# mpv — tuned for: AMD RX 6700 XT (Navi 22) + AORUS FO32U2 (4K QD-OLED HDR)
#                  + Hyprland with cm_auto_hdr=1.
# mpv 0.41+, libplacebo 7.36+. Some options here are recent; if you ever
# downgrade mpv you may need to drop a few lines.
#
# Reference: https://mpv.io/manual/master/

# ============================================================================
# Video output — modern libplacebo path with Vulkan on Wayland
# ============================================================================
# gpu-next is the libplacebo-based renderer. Strictly better than gpu since
# mpv 0.36+ for HDR, color management, and scaler quality.
vo=gpu-next
gpu-api=vulkan
gpu-context=waylandvk

# Hardware decode (AMD AMF / VA-API / Vulkan video decode). `auto-safe` skips
# decoders known to cause issues. Direct rendering avoids extra copies.
hwdec=auto-safe
vd-lavc-dr=yes
vd-lavc-fast=no              # disable for color-correct decoding

# ============================================================================
# HDR — auto-trigger Hyprland's cm_auto_hdr by signaling the compositor that
# we'll output HDR-tagged content via wp_color_management_v1.
# ============================================================================
target-colorspace-hint=yes
# Smooth tone-mapping fallback for HDR-on-SDR-output (rare with cm_auto_hdr)
tone-mapping=bt.2446a
hdr-compute-peak=yes
gamut-mapping-mode=perceptual
target-contrast=inf           # OLED has true blacks (infinite contrast) — tells
                              # libplacebo to tone-map dark detail correctly

# ============================================================================
# Scaling — high-quality presets aren't a single line in 0.41+; specify each.
# Defaults below are ewa_lanczossharp + Mitchell — the consensus "best balance
# of sharpness and ringing" for video at 4K/upscale.
# ============================================================================
scale=ewa_lanczossharp        # luma upscale
dscale=mitchell               # luma downscale (4K → smaller)
cscale=ewa_lanczossharp       # chroma upscale
scaler-resizes-only=yes       # skip scaler when source matches output
correct-downscaling=yes
linear-downscaling=no         # disabled — modern best practice
sigmoid-upscaling=yes
dither-depth=auto             # use display bit depth (10-bit on AORUS)

# ============================================================================
# Motion — interpolation for smooth playback on 240Hz panel
# ============================================================================
video-sync=display-resample
# interpolation OFF: for 24fps film it (a) creates the "soap opera effect" and
# (b) forces rendering ~240 frames/sec of 4K HDR, which the RX 6750 XT can't
# sustain (render ~5.6ms > 4.17ms/240Hz budget) → dropped/mistimed frames.
# With VRR (vrr=2, fullscreen) the panel follows the film's native cadence.
interpolation=no
tscale=oversample             # only used when interpolation=yes; harmless here

# ============================================================================
# Banding — deband OFF for maximum accuracy. Debanding smooths gradients but
# also smears fine detail and film grain (a real loss on clean UHD sources like
# this BR2049 disc). Leave off for "reference" viewing. If you ever spot visible
# banding (skies, slow fades) on a specific lower-bitrate file, re-enable lightly
# per-file with: --deband=yes --deband-iterations=1 --deband-grain=24
# ============================================================================
deband=no

# ============================================================================
# Subtitles
# ============================================================================
sub-font=Inter
sub-font-size=32              # ~25% smaller than the old 42
sub-color="#FFFFFFFF"
sub-border-color="#FF000000"
sub-border-size=2.0
sub-back-color="#80000000"
sub-shadow-offset=1
sub-shadow-color="#33000000"
sub-spacing=0.5
# Place subtitles in the letterbox black bars instead of over the image.
# sub-ass-force-margins lets ASS subs use the bars; sub-use-margins does the same
# for plain subs. NOTE: this requires blend-subtitles=no — `=video` composites
# subs onto the video frame *before* letterboxing, which confines them to the
# image (can't reach the bars). Tradeoff: subs are now drawn at output stage, so
# in HDR they render at libplacebo's reference white (~203 nits) rather than in
# the video's color space — still fine, just no longer "blended HDR-correct".
blend-subtitles=no
sub-ass-force-margins=yes
sub-use-margins=yes
sub-ass-override=yes          # respect our font settings even on .ass subs
sub-fix-timing=yes
sub-auto=fuzzy                # match subs even when filename is approximate

# Default subtitle language priority
slang=en,eng,enUS,english
alang=ja,jpn,japanese,en,eng,english

# ============================================================================
# Audio
# ============================================================================
audio-pitch-correction=yes
volume=80                     # default startup volume (avoid 100% surprise)
volume-max=200                # allow boost above 100% for quiet sources
audio-channels=auto-safe
# Keep full channels from the decoder so our downmix profiles (below) can do a
# proper headphone fold-down. Without this, libavcodec pre-downmixes and the
# pan matrix has nothing to work with (= quiet, flat dialog on stereo cans).
ad-lavc-downmix=no

# ============================================================================
# Cache — your media drives (sda/sdb/sdc) are spinning HDDs, so a big readahead
# buffer prevents hitches when the disk seeks during 4K playback. Harmless (just
# idle) when a file is on the SSD instead.
# ============================================================================
cache=yes
demuxer-max-bytes=2GiB
demuxer-max-back-bytes=512MiB
demuxer-readahead-secs=30

# ============================================================================
# UX / OSD / screenshots
# ============================================================================
keep-open=yes                 # don't auto-close on EOF (lets you re-watch)
save-position-on-quit=yes
watch-later-options-clr       # don't restore --start, --speed, etc.
cursor-autohide=1000

osc=yes                       # built-in on-screen controller (the seek bar)
osd-bar=yes
osd-font=Inter
osd-font-size=28
osd-bold=yes
osd-color="#FFFFFFFF"
osd-border-color="#FF000000"
osd-border-size=2

screenshot-format=png
screenshot-png-compression=8
screenshot-directory=~/Pictures/mpv
screenshot-template="%F-%P-%n"

# ============================================================================
# yt-dlp integration — for streaming URLs
# ============================================================================
ytdl=yes
ytdl-format="bestvideo[height<=?2160][vcodec!*=av01]+bestaudio/best"
script-opts=ytdl_hook-ytdl_path=yt-dlp

# ============================================================================
# Profiles — auto-applied via profile-cond
# ============================================================================

# When source is HDR (peak luminance > SDR's 1.0), make sure all the HDR-
# correct settings stick even if a default profile (below) overrides.
[hdr]
profile-cond=p["video-params/sig-peak"]>1
profile-restore=copy-equal
target-colorspace-hint=yes
hdr-compute-peak=yes

# Headphone downmix (Sennheiser HD 6XX = stereo cans). True Atmos/TrueHD
# bitstreaming needs an AV receiver, so for headphones the win is a *clean*
# fold-down: dialog (FC) kept loud, LFE low-passed and mixed into mains, rears
# at -3dB. Far better than letting PipeWire blindly fold 8ch → 2ch (quiet
# dialog). Auto-applies by channel count. Matrices are the mpv-community
# consensus from issue #6343/#11901.
[downmix-7_1]
profile-cond=get("audio-params/channel-count") >= 7
profile-restore=copy-equal
af=lavfi="lowpass=c=LFE:f=120,pan=stereo|FL=0.5*FC+0.3*FLC+0.3*FL+0.3*BL+0.3*SL+0.5*LFE|FR=0.5*FC+0.3*FRC+0.3*FR+0.3*BR+0.3*SR+0.5*LFE"

[downmix-5_1]
profile-cond=get("audio-params/channel-count") >= 5 and get("audio-params/channel-count") < 7
profile-restore=copy-equal
af=lavfi="lowpass=c=LFE:f=120,pan=stereo|FL=0.5*FC+0.707*FL+0.707*BL+0.5*LFE|FR=0.5*FC+0.707*FR+0.707*BR+0.5*LFE"

# Anime-friendly preset — turn on with `--profile=anime`
[anime]
deband-iterations=2
deband-threshold=64
deband-range=20
scale=ewa_lanczossharp
dscale=mitchell
cscale=ewa_lanczossharp

# Low-power preset (battery / thermal) — `--profile=low-power`
[low-power]
hwdec=auto-safe
deband=no
interpolation=no
scale=bilinear
dscale=bilinear
