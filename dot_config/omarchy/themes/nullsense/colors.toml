# nullsense — gruvbox-dark-hard palette tuned for QD-OLED.
# Differs from omarchy's stock gruvbox (medium) in the harder background
# (#1d2021 vs #282828) which gives QD-OLED that crisper near-black, and
# uses the canonical ebdbb2 foreground instead of the muted d4be98.

accent               = "#fabd2f"
cursor               = "#bdae93"
foreground           = "#ebdbb2"
background           = "#1d2021"
selection_foreground = "#ebdbb2"
selection_background = "#a89984"

# Normal palette
color0  = "#282828"
color1  = "#cc241d"
color2  = "#98971a"
color3  = "#d79921"
color4  = "#458588"
color5  = "#b16286"
color6  = "#689d6a"
color7  = "#a89984"

# Bright palette
color8  = "#928374"
color9  = "#fb4934"
color10 = "#b8bb26"
color11 = "#fabd2f"
color12 = "#83a598"
color13 = "#d3869b"
color14 = "#8ec07c"
color15 = "#ebdbb2"
