# ~/.config/pacman/makepkg.conf
# Per-user makepkg overrides. Sourced by makepkg AFTER /etc/makepkg.conf and
# /etc/makepkg.conf.d/*.conf, so anything here wins. Only ADDS build env;
# does not redefine CFLAGS / MAKEFLAGS / BUILDENV.
#
# Managed by chezmoi (source: dot_config/pacman/makepkg.conf).

# --- llama.cpp-cuda (AUR) custom build flags -------------------------------
# The PKGBUILD appends $LLAMA_BUILD_EXTRA_ARGS to its cmake call, so we inject
# tuning here instead of editing the PKGBUILD. Survives `paru -Syu` (paru
# re-fetches the PKGBUILD each update; this env var persists) -> auto-updates
# WITH our flags.
#
# This block self-adjusts on whether ccache is installed:
#   * ccache present -> let ggml use ccache (drives nvcc fine + caches rebuilds,
#       turning every version-bump rebuild from ~45min into minutes). Install
#       with `pacman -S ccache`; tune cache with `ccache -M 25G`.
#   * ccache absent  -> must disable ggml's compiler launcher, because
#       ggml/src/CMakeLists.txt:68 otherwise falls back to your sccache
#       (RULE_LAUNCH_COMPILE), and sccache can't drive nvcc -> build fails.
#       (Your Rust sccache in ~/.cargo/config.toml is separate, untouched.)
#
# GGML_CUDA_F16 = FP16 intermediates; perf win on Blackwell (RTX 5090).
# GPU arch is NOT pinned: llama.cpp's cmake selects native -> appends
# 120a-real for sm_120 (CUDA>=12.8), the correct 5090 target incl. FP4 'a'.
if command -v ccache >/dev/null 2>&1; then
    export LLAMA_BUILD_EXTRA_ARGS="-DGGML_CUDA_F16=ON"
else
    export LLAMA_BUILD_EXTRA_ARGS="-DGGML_CCACHE=OFF -DGGML_CUDA_F16=ON"
fi
