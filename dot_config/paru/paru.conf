# paru config — managed by chezmoi (dot_config/paru/paru.conf).
# NOTE: paru uses the FIRST config it finds (~/.config/paru/paru.conf wins over
# /etc/paru.conf — it does NOT merge). The [options] below mirror the distro
# /etc/paru.conf as of 2026-06-12; if pacman updates that file, re-sync here.
[options]
PgpFetch
Devel
Provides
DevelSuffixes = -git -cvs -svn -bzr -darcs -always -hg -fossil
RemoveMake
CleanAfter

# Review every PKGBUILD/diff before building (paru default; do NOT add
# SkipReview). This is your first line of defence against compromised AUR
# packages — read the diff, especially any new npm/bun/curl lines.

[bin]
# Pre-build gate: aborts the build if the PKGBUILD/.install matches known
# malicious IOC families (Atomic Arch npm droppers, curl|bash, reverse shells,
# etc.). Bypass one build with: AUR_GUARD_DISABLE=1 paru -S <pkg>
PreBuildCommand = /home/nullsense/bin/aur-build-guard
