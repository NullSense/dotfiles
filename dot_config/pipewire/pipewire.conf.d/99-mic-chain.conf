# Voice (Cleaned) — virtual mic source for the Samson Q2U.
#
# Chain: high-pass -> RNNoise -> proximity tame -> presence boost -> compressor -> limiter
#
# LSP gain controls are LINEAR factors, not dB. Cheat sheet:
#   -20 dB = 0.1     -1 dB = 0.891     +6 dB = 2.0     +0 dB = 1.0
#   -3 dB  = 0.708   +3 dB = 1.413
#
# Builtin biquad Gain controls ARE in dB.

context.modules = [
  { name = libpipewire-module-filter-chain
    args = {
      node.description = "Voice (Cleaned)"
      media.name       = "Voice (Cleaned)"
      filter.graph = {
        nodes = [
          { type = builtin name = hpf  label = bq_highpass control = { Freq = 80.0  Q = 0.707 } }

          { type = ladspa  name = rnnoise
            plugin = /usr/lib/ladspa/librnnoise_ladspa.so
            label  = noise_suppressor_mono
            control = {
              "VAD Threshold (%)"          = 50.0
              "VAD Grace Period (ms)"      = 200
              "Retroactive VAD Grace (ms)" = 0
            }
          }

          # Chest warmth — gives an adult male voice depth without sounding boomy.
          { type = builtin name = eq_warmth    label = bq_peaking control = { Freq = 120.0  Q = 1.5  Gain =  2.0 } }
          # Tame the 200 Hz proximity buildup that makes close-mic'd voices muddy.
          { type = builtin name = eq_proximity label = bq_peaking control = { Freq = 220.0  Q = 1.0  Gain = -3.0 } }
          # Cut "boxy/honky" range — most adult male voices have a slight buildup here.
          { type = builtin name = eq_box       label = bq_peaking control = { Freq = 500.0  Q = 1.5  Gain = -2.0 } }
          # Presence boost — clarity, intelligibility, the "broadcast" sheen.
          { type = builtin name = eq_presence  label = bq_peaking control = { Freq = 4000.0 Q = 1.0  Gain =  4.0 } }
          # Mild "air" — Q2U rolls off above 12 kHz so this is gentle.
          { type = builtin name = eq_air       label = bq_highshelf control = { Freq = 9000.0 Q = 0.7 Gain =  2.0 } }

          { type = ladspa name = comp
            plugin = /usr/lib/ladspa/lsp-plugins-ladspa.so
            label  = "http://lsp-plug.in/plugins/ladspa/compressor_mono"
            control = {
              "Compression mode"      = 0
              "Sidechain mode"        = 1
              "Attack threshold (G)"  = 0.1
              "Release threshold (G)" = 0.0
              "Attack time (ms)"      = 10.0
              "Release time (ms)"     = 100.0
              "Ratio"                 = 3.0
              "Makeup gain (G)"       = 2.0
            }
          }

          { type = ladspa name = lim
            plugin = /usr/lib/ladspa/lsp-plugins-ladspa.so
            label  = "http://lsp-plug.in/plugins/ladspa/limiter_mono"
            control = {
              "Operating mode"    = 0
              "Threshold (G)"     = 0.891
              "Lookahead (ms)"    = 5.0
              "Attack time (ms)"  = 4.0
              "Release time (ms)" = 6.0
            }
          }
        ]

        links = [
          { output = "hpf:Out"          input = "rnnoise:Input"   }
          { output = "rnnoise:Output"   input = "eq_warmth:In"    }
          { output = "eq_warmth:Out"    input = "eq_proximity:In" }
          { output = "eq_proximity:Out" input = "eq_box:In"       }
          { output = "eq_box:Out"       input = "eq_presence:In"  }
          { output = "eq_presence:Out"  input = "eq_air:In"       }
          { output = "eq_air:Out"       input = "comp:Input"      }
          { output = "comp:Output"      input = "lim:Input"       }
        ]
      }

      capture.props = {
        node.name      = "capture.voice_cleaned"
        node.passive   = true
        audio.rate     = 48000
        audio.channels = 1
        target.object  = "alsa_input.usb-Samson_Technologies_Samson_Q2U_Microphone-00.analog-stereo"
      }

      playback.props = {
        node.name           = "voice_cleaned"
        node.description    = "Voice (Cleaned)"
        media.class         = Audio/Source
        audio.rate          = 48000
        audio.channels      = 1
        audio.allowed-rates = [ 16000 22050 32000 44100 48000 ]
        priority.session    = 4000
      }
    }
  }
]
