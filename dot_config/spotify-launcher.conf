# spotify-launcher reads this file at startup and passes extra_arguments
# directly to the spotify child process. Verified via the binary's TOML
# schema strings (struct SpotifyConfig: extra_arguments, extra_env_vars,
# download_attempts). Config path is XDG_CONFIG_HOME/spotify-launcher.conf.
#
# Why these flags:
#   spotify-launcher 0.6.5 launches Spotify with --ozone-platform=x11
#   built into the upstream spotify binary, which puts internal popups
#   (right-click menus, account dropdown, queue) at X11 absolute coords
#   while Hyprland positions the window in Wayland coords — dropdowns
#   land off-center. Forcing the Wayland Ozone backend makes the popup
#   coordinate math match where the window actually rendered.
#
# WaylandFractionalScaleV1 not strictly needed here (DP-1 is integer 2.0),
# but harmless and helps if a fractional-scale monitor is ever connected.

[spotify]
extra_arguments = [
  "--ozone-platform=wayland",
  "--enable-features=UseOzonePlatform,WaylandWindowDecorations,WaylandFractionalScaleV1",
  "--enable-wayland-ime",
]
