# Walker — Omarchy-style with our gruvbox theme.
#
# Walker model: a compositor-aware GTK4 launcher. Default invocation lists
# desktop apps + websearch; prefixes route to other providers.
#
# Service mode: walker --gapplication-service runs in the background so the
# UI summons in <50ms. autostart.conf launches it.

force_keyboard_focus       = true
selection_wrap             = true
hide_action_hints          = true

# Use omarchy's layout/CSS theme; it imports
# ~/.config/omarchy/current/theme/walker.css so colors flip with omarchy-theme-set.
# additional_theme_location points walker at the in-tree omarchy theme dir.
theme                      = "nullsense"
additional_theme_location  = "~/.local/share/omarchy/default/walker/themes/"

# Per-provider placeholders. The "default" placeholder is now compact —
# the prefix legend lives in the static GtkLabel at the bottom of the
# nullsense theme layout.xml so it stays visible regardless of search
# query and doesn't overload the input row.
[placeholders]
"default"            = { input = " Search…", list = "No results" }
"providerlist"       = { input = " Pick a provider…",   list = "" }
"desktopapplications"= { input = " App…",                list = "No matching apps" }
"runner"             = { input = " Run command…",       list = "Type any shell command" }
"windows"            = { input = " Switch window…",     list = "No open windows" }
"calc"               = { input = " Calc — try `1024^2` or `5 * 7 GBP to EUR`", list = "Type an expression" }
"websearch"          = { input = " Search · g · p (perplexity) · y (yt) · gh · ar · wk · mdn · cr", list = "Type a query" }
"files"              = { input = " File path…",         list = "Type a path or pattern" }
"symbols"            = { input = " Emoji / symbol…",   list = "" }
"clipboard"          = { input = " Clipboard history…", list = "Empty" }
"bookmarks"          = { input = " Bookmark…",          list = "" }
"archlinuxpkgs"      = { input = " Arch package…",      list = "" }

[keybinds]
quick_activate = []

[columns]
symbols = 1

[providers]
max_results = 256
default = ["desktopapplications", "websearch"]

# Prefix routing — type these characters to switch provider mid-search:
[[providers.prefixes]]
prefix   = "/"
provider = "providerlist"

[[providers.prefixes]]
prefix   = "."
provider = "files"

[[providers.prefixes]]
prefix   = ":"
provider = "symbols"

[[providers.prefixes]]
prefix   = "="
provider = "calc"

[[providers.prefixes]]
prefix   = "@"
provider = "websearch"

[[providers.prefixes]]
prefix   = "$"
provider = "clipboard"
