# Override device descriptions so pavucontrol / waybar / app pickers show
# human-friendly names instead of vendor jargon.

monitor.alsa.rules = [
  { matches = [ { node.name = "alsa_output.pci-0000_0f_00.6.analog-stereo" } ]
    actions = { update-props = { node.description = "Headphones (rear jack)" } } }

  { matches = [ { node.name = "alsa_output.pci-0000_03_00.1.hdmi-stereo-extra4" } ]
    actions = { update-props = { node.description = "Aorus FO32U2 speakers" } } }

  { matches = [ { node.name = "alsa_input.usb-Samson_Technologies_Samson_Q2U_Microphone-00.analog-stereo" } ]
    actions = { update-props = { node.description = "Q2U (raw)" } } }

]

# easyeffects_source is created by the EasyEffects daemon (not an ALSA device),
# so it needs node.rules rather than monitor.alsa.rules.
node.rules = [
  { matches = [ { node.name = "easyeffects_source" } ]
    actions = { update-props = { node.description = "Voice (Cleaned)" } } }
]
