[mgr]
show_hidden    = true
sort_by        = "natural"
sort_dir_first = true
scrolloff      = 5

[preview]
max_width     = 1000
max_height    = 1200
image_delay   = 30
image_filter  = "triangle"
image_quality = 75

[tasks]
image_alloc = 1073741824

[plugin]
# Main-pane image preview -> terminal-adaptive (see plugins/chafa.yazi): real
# pixels via the graphics protocol in kitty/ghostty/wezterm (use `yk` = kitty -e
# yazi), dense octant chafa blocks in Alacritty (no Sixel/Kitty-graphics there).
# The plugin auto-detects; nothing to toggle when switching terminals.
prepend_previewers = [
	{ mime = "image/*", run = "chafa" },
]

# Tab on a hovered image -> rich spot panel (native dims + EXIF via exiftool).
# Prepended so it wins over the built-in image spotter; needs perl-image-exiftool
# for the EXIF rows, but degrades to the stock info if it's absent.
prepend_spotters = [
	{ mime = "image/*", run = "exif" },
]

# Enter / `o` on an image -> open in tev (HDR / 10-bit / color-managed viewer).
# `orphan = true` detaches it from yazi so the floating tev window lives on its
# own (yazi stays usable, and quitting yazi won't kill the viewer). Hyprland
# floats + centers it via the `match:class tev` rule in hypr/windows.conf.
[opener]
# tev-fit (~/bin) launches `tev --hide-ui --auto-fit` (clean, image-only view)
# then sizes the floating window to the image's real pixels — or goes fullscreen
# when the image is >=95% of the monitor. orphan=true so the viewer detaches.
image = [
	{ run = 'tev-fit "$@"', desc = "View in tev (HDR, sized)", orphan = true, for = "unix" },
]

[open]
prepend_rules = [
	{ mime = "image/*", use = "image" },
]
