<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
body { font: 14px "DejaVu Sans", sans-serif; padding: 30px; max-width: 700px; }
h3 { margin: 0 0 12px 0; }
.chart { display: grid; grid-template-columns: 80px 1fr 60px; gap: 6px 10px; align-items: center; margin: 16px 0; }
.label { text-align: right; font-size: 13px; color: #333; }
.bar { background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 100%); height: 22px; border-radius: 3px; }
.value { font-variant-numeric: tabular-nums; font-weight: 600; color: #1e3a8a; }
.caption { font-size: 12px; color: #666; margin-top: 8px; font-style: italic; }
</style></head><body>
<h3>Monthly active users by platform — Q3 2026</h3>
<div class="chart">
<div class="label">iOS</div>     <div class="bar" style="width: 92%"></div> <div class="value">12,847</div>
<div class="label">Android</div> <div class="bar" style="width: 100%"></div><div class="value">14,002</div>
<div class="label">Web</div>     <div class="bar" style="width: 64%"></div> <div class="value">8,953</div>
<div class="label">Desktop</div> <div class="bar" style="width: 28%"></div> <div class="value">3,920</div>
<div class="label">CLI</div>     <div class="bar" style="width: 9%"></div>  <div class="value">1,254</div>
</div>
<p class="caption">Source: internal analytics, week 13 · sample size 41,176 unique users</p>
</body></html>
